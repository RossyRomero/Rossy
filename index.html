<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Don Sebe ERP - Sistema Operativo Completo</title>
    <link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icono.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para NIIF/Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style><>
        /* Animaciones base y utilidades nativas */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Ocultar scrollbars manteniendo funcionalidad */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col h-screen bg-slate-50 font-sans overflow-hidden text-slate-800">

    <!-- Contenedor Dinámico Principal -->
    <div id="app-root" class="flex flex-col h-full w-full"></div>

<script>
/**
 * ==========================================
 * NÚCLEO DEL SISTEMA (STATE MANAGEMENT)
 * ==========================================
 */

const formatCOP = (value) => new Intl.NumberFormat('es-CO', {
    style: 'currency', currency: 'COP', minimumFractionDigits: 0, maximumFractionDigits: 0
}).format(value || 0);

const App = {
    state: {
        activeTab: 'dashboard',
        niifTab: 'informe-consolidado',
        docTab: 'escaner',
        sociedadFiltroMes: 'Todos',
        carteraViajeFiltro: 'Todos',
        isUploading: false,
        uploadSuccess: false,

        selectedViaje: null,
        selectedCliente: null,
        isAddViajeOpen: false,
        isAddClienteOpen: false,
        isAddNominaOpen: false,

        // Datos (Mock BD Cruzada con Archivos Reales)
        viajes: [
            { id: 1, fecha: '2025-10-25', viaje: 'Viaje #1', periodo: 'Oct-Nov 2025', ruta: 'B/tura - Satinga', ingreso: 66956000, gastos: 29107000, utilidadBruta: 37849000, cartera: 12411000, ingresoRecaudado: 54545000, observaciones: 'Madera bajada Satinga (Oscar)' },
            { id: 2, fecha: '2025-11-09', viaje: 'Viaje #2', periodo: 'Oct-Nov 2025', ruta: 'B/tura - Satinga', ingreso: 46440300, gastos: 18340300, utilidadBruta: 28100000, cartera: 11084000, ingresoRecaudado: 35356300, observaciones: 'Madera Oscar' },
            { id: 3, fecha: '2025-11-19', viaje: 'Viaje #3', periodo: 'Oct-Nov 2025', ruta: 'B/tura - Charco', ingreso: 73131000, gastos: 26871000, utilidadBruta: 46260000, cartera: 0, ingresoRecaudado: 73131000, observaciones: 'Flete completo pagado' },
            { id: 4, fecha: '2025-12-02', viaje: 'Viaje #4', periodo: 'Diciembre 2025', ruta: 'B/tura - Charco', ingreso: 80023500, gastos: 22800000, utilidadBruta: 57223500, cartera: 32119500, ingresoRecaudado: 47904000, observaciones: 'Tubos, Grava, Varillas Tola (Alex) y Proyecto Hospital' },
            { id: 5, fecha: '2025-12-23', viaje: 'Viaje #5', periodo: 'Diciembre 2025', ruta: 'B/tura - Tumaco', ingreso: 34820000, gastos: 16000000, utilidadBruta: 18820000, cartera: 0, ingresoRecaudado: 34820000, observaciones: 'Viaje Tumaco sin cartera' }
        ],
        carteraViajes: [
            { id: 1, idViaje: 1, viaje: 'Viaje #1', cliente: 'Oscar', concepto: 'Madera bajada Satinga', valor: 12411000, fecha: '2025-10-25' },
            { id: 2, idViaje: 2, viaje: 'Viaje #2', cliente: 'Oscar', concepto: 'Madera bajada Satinga', valor: 11084000, fecha: '2025-11-09' },
            { id: 3, idViaje: 4, viaje: 'Viaje #4', cliente: 'Alex', concepto: 'Tubos / Grava La Tola', valor: 13000000, fecha: '2025-12-02' },
            { id: 4, idViaje: 4, viaje: 'Viaje #4', cliente: 'Konny Hospital', concepto: 'Proyecto Hospital', valor: 1000000, fecha: '2025-12-02' },
            { id: 5, idViaje: 4, viaje: 'Viaje #4', cliente: 'Alex', concepto: 'Varillas Tola', valor: 4900000, fecha: '2025-12-02' },
            { id: 6, idViaje: 4, viaje: 'Viaje #4', cliente: 'Oscar', concepto: 'Madera bajada', valor: 8209500, fecha: '2025-12-02' }
        ],
        clientesDir: [
            { id: 1, nombre: 'John Jairo Silva', tipo: 'Equipos e Insumos', telefono: '310 000 0000', ubicacion: 'Buenaventura' },
            { id: 2, nombre: 'Oscar', tipo: 'Comerciante de Madera', telefono: '312 000 0000', ubicacion: 'Satinga' },
            { id: 3, nombre: 'Alex', tipo: 'Materiales Construcción', telefono: '315 000 0000', ubicacion: 'La Tola' },
            { id: 4, nombre: 'Konny Hospital', tipo: 'Institucional / Salud', telefono: '318 000 0000', ubicacion: 'El Charco' },
            { id: 5, nombre: 'Modesto', tipo: 'Socio / Proveedor', telefono: '320 000 0000', ubicacion: 'Tumaco' }
        ],
        carteraClientes: [
            { id: 1, cliente: 'John Jairo Silva', conceptoGeneral: 'Equipos e insumos', valorTotal: 41300000, viajesAsociados: 'Histórico', estado: 'Pendiente' },
            { id: 2, cliente: 'Oscar', conceptoGeneral: 'Madera bajada (Satinga)', valorTotal: 31704500, viajesAsociados: 'Viaje #1, #2, #4', estado: 'Pendiente' },
            { id: 3, cliente: 'Alex', conceptoGeneral: 'Materiales construcción Tola', valorTotal: 31400000, viajesAsociados: 'Viaje #4 y otros', estado: 'Pendiente' },
            { id: 4, cliente: 'Konny Hospital', conceptoGeneral: 'Transporte Hospital', valorTotal: 1000000, viajesAsociados: 'Viaje #4', estado: 'Pendiente' }
        ],
        socios: [
            { nombre: 'PRI (Socio 40%)', porcentaje: 40.0, inversion: 447637320, saldoMantenimiento: -81900472, utilidadCausada: 69689184 },
            { nombre: 'Enel-Luz', porcentaje: 39.0, inversion: 766593300, saldoMantenimiento: 0, utilidadCausada: 67946954 },
            { nombre: 'Roel', porcentaje: 15.0, inversion: 277500000, saldoMantenimiento: 0, utilidadCausada: 26133444 },
            { nombre: 'Ronel', porcentaje: 2.22, inversion: 40000000, saldoMantenimiento: 0, utilidadCausada: 3867751 },
            { nombre: 'Roy', porcentaje: 1.94, inversion: 30000000, saldoMantenimiento: 0, utilidadCausada: 3379991 },
            { nombre: 'Rossy', porcentaje: 1.7, inversion: 15849000, saldoMantenimiento: 0, utilidadCausada: 2961849 }
        ],
        nomina: [
            { cargo: 'Capitán', valorDia: 190000, dias: 5 },
            { cargo: 'Marinero 1', valorDia: 80000, dias: 5 },
            { cargo: 'Marinero 2', valorDia: 80000, dias: 5 },
            { cargo: 'Marinero 3', valorDia: 80000, dias: 5 },
            { cargo: 'Cocinero', valorDia: 80000, dias: 5 },
            { cargo: 'Maquinista 1', valorDia: 120000, dias: 5 },
            { cargo: 'Maquinista 2', valorDia: 100000, dias: 5 }
        ],
        pagosNomina: [
            { id: 1, fecha: '2025-10-30', viaje: 'Viaje #1', valor: 3200000, estado: 'Pagado' },
            { id: 2, fecha: '2025-11-14', viaje: 'Viaje #2', valor: 3200000, estado: 'Pagado' },
            { id: 3, fecha: '2025-11-24', viaje: 'Viaje #3', valor: 3200000, estado: 'Pagado' },
            { id: 4, fecha: '2025-12-07', viaje: 'Viaje #4', valor: 3200000, estado: 'Pagado' },
            { id: 5, fecha: '2025-12-28', viaje: 'Viaje #5', valor: 3200000, estado: 'Pagado' }
        ],
        informePeriodos: [
            { periodo: 'Oct-Nov 2025', ingresoProy: 186527300, ingresoReal: 163032300, utilProy: 112209000, utilReal: 88714000, cartera: 23495000 },
            { periodo: 'Diciembre 2025', ingresoProy: 114851610, ingresoReal: 82732110, utilProy: 77226610, utilReal: 45107110, cartera: 32119500 },
            { periodo: 'Enero 2026', ingresoProy: 107125600, ingresoReal: 52325600, utilProy: 77125600, utilReal: 22325600, cartera: 54800000 },
        ]
    },

    navItems: [
        { id: 'dashboard', label: 'Inicio', icon: 'trending-up' },
        { id: 'viajes', label: 'Viajes', icon: 'ship' },
        { id: 'cartera', label: 'Cartera', icon: 'wallet' },
        { id: 'documentos', label: 'Archivos', icon: 'file-scan' },
        { id: 'nomina', label: 'Nómina', icon: 'users' },
        { id: 'clientes', label: 'Clientes', icon: 'contact' },
        { id: 'finanzas', label: 'NIIF', icon: 'landmark' },
        { id: 'sociedad', label: 'Sociedad', icon: 'anchor' }
    ],

    // Métodos de Mutación (Acciones)
    setTab: (tab) => { App.state.activeTab = tab; App.render(); },
    setNiifTab: (tab) => { App.state.niifTab = tab; App.render(); },
    setDocTab: (tab) => { App.state.docTab = tab; App.render(); },
    setFilterVal: (key, val) => { App.state[key] = val; App.render(); },
    
    openModalViaje: (id) => { App.state.selectedViaje = App.state.viajes.find(v => v.id === id); App.render(); },
    openModalCliente: (clienteNombre) => { App.state.selectedCliente = App.state.carteraClientes.find(c => c.cliente === clienteNombre); App.render(); },
    closeModals: () => { 
        App.state.selectedViaje = null; 
        App.state.selectedCliente = null; 
        App.state.isAddViajeOpen = false;
        App.state.isAddClienteOpen = false;
        App.state.isAddNominaOpen = false;
        App.render(); 
    },

    // Calculadoras
    getTotales: () => {
        const s = App.state;
        const ingresoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.ingreso), 0);
        const gastoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.gastos), 0);
        const utilidadBruta = s.viajes.reduce((acc, curr) => acc + Number(curr.utilidadBruta), 0);
        const carteraTotal = s.carteraClientes.filter(c => c.estado === 'Pendiente').reduce((acc, curr) => acc + Number(curr.valorTotal), 0);
        const utilidadNeta = ingresoTotal - gastoTotal; // Utilidad generada total
        const ingresoRecaudado = ingresoTotal - carteraTotal;
        const inversionTotal = s.socios.reduce((acc, curr) => acc + curr.inversion, 0);
        return { ingresoTotal, gastoTotal, utilidadBruta, carteraTotal, utilidadNeta, ingresoRecaudado, inversionTotal };
    },

    handleMockUpload: () => {
        App.state.isUploading = true;
        App.state.uploadSuccess = false;
        App.render();
        setTimeout(() => {
            App.state.isUploading = false;
            App.state.uploadSuccess = true;
            App.render();
        }, 2000);
    },

    // Handlers de formularios
    submitViaje: (e) => {
        e.preventDefault(); const f = e.target;
        const ing = Number(f.ingreso.value); const gas = Number(f.gastos.value); const car = Number(f.cartera.value || 0);
        App.state.viajes.push({
            id: App.state.viajes.length + 1, viaje: `Viaje #${App.state.viajes.length + 1}`, periodo: 'Nuevo Periodo',
            fecha: f.fecha.value, ruta: f.ruta.value, ingreso: ing, 
            gastos: gas, utilidadBruta: ing - gas, cartera: car, ingresoRecaudado: ing - car, observaciones: f.observaciones.value
        });
        App.closeModals();
    },
    submitCliente: (e) => {
        e.preventDefault(); const f = e.target;
        App.state.clientesDir.push({
            id: App.state.clientesDir.length + 1, nombre: f.nombre.value, tipo: f.tipo.value,
            telefono: f.telefono.value, ubicacion: f.ubicacion.value
        });
        App.closeModals();
    },
    submitNomina: (e) => {
        e.preventDefault(); const f = e.target;
        const totalNominaViaje = App.state.nomina.reduce((acc, curr) => acc + (curr.valorDia * curr.dias), 0);
        App.state.pagosNomina.unshift({
            id: App.state.pagosNomina.length + 1, fecha: f.fecha.value, viaje: f.viaje.value, 
            valor: totalNominaViaje, estado: 'Pagado'
        });
        App.closeModals();
    },

    /**
     * ==========================================
     * RENDERIZADORES DE VISTAS (COMPONENTES)
     * ==========================================
     */
    renderDashboard: () => {
        const t = App.getTotales();
        const margenOperativo = t.ingresoTotal > 0 ? ((t.utilidadNeta / t.ingresoTotal) * 100).toFixed(1) : 0;
        const eficienciaRecaudo = t.ingresoTotal > 0 ? ((t.ingresoRecaudado / t.ingresoTotal) * 100).toFixed(1) : 0;
        const roi = t.inversionTotal > 0 ? ((t.utilidadNeta / t.inversionTotal) * 100).toFixed(2) : 0;

        return `
        <div class="space-y-6 animate-fade-in print:hidden">
            <div>
                <h2 class="text-xl md:text-2xl font-bold text-slate-800">Dashboard Operativo y Financiero</h2>
                <p class="text-sm text-slate-500">M/N Greicy Jireth - KPIs consolidados en Tiempo Real</p>
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow cursor-pointer"><div class="flex justify-between items-center mb-2"><p class="text-xs font-bold text-slate-500 uppercase">Ingresos Brutos</p><div class="p-1.5 bg-blue-50 rounded-lg text-blue-600"><i data-lucide="trending-up" class="w-4 h-4"></i></div></div><h3 class="text-xl lg:text-2xl font-black text-slate-800">${formatCOP(t.ingresoTotal)}</h3></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow cursor-pointer"><div class="flex justify-between items-center mb-2"><p class="text-xs font-bold text-slate-500 uppercase">Costos Operativos</p><div class="p-1.5 bg-red-50 rounded-lg text-red-600"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i></div></div><h3 class="text-xl lg:text-2xl font-black text-slate-800">${formatCOP(t.gastoTotal)}</h3></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow cursor-pointer"><div class="flex justify-between items-center mb-2"><p class="text-xs font-bold text-slate-500 uppercase">Utilidad Bruta</p><div class="p-1.5 bg-green-50 rounded-lg text-green-600"><i data-lucide="line-chart" class="w-4 h-4"></i></div></div><h3 class="text-xl lg:text-2xl font-black text-slate-800">${formatCOP(t.utilidadBruta)}</h3></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow cursor-pointer"><div class="flex justify-between items-center mb-2"><p class="text-xs font-bold text-slate-500 uppercase">Cartera Activa</p><div class="p-1.5 bg-orange-50 rounded-lg text-orange-600"><i data-lucide="alert-circle" class="w-4 h-4"></i></div></div><h3 class="text-xl lg:text-2xl font-black text-slate-800">${formatCOP(t.carteraTotal)}</h3></div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 h-[400px] flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-sm font-bold text-slate-800 flex items-center"><i data-lucide="bar-chart-2" class="mr-2 text-blue-600 w-4 h-4"></i> Tendencia Financiera (Monto en Millones)</h3>
                    </div>
                    <div class="flex-1 min-h-0 relative"><canvas id="lineChart"></canvas></div>
                </div>
                
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 h-[400px] flex flex-col">
                    <h3 class="text-sm font-bold text-slate-800 mb-4 flex items-center"><i data-lucide="activity" class="mr-2 text-green-500 w-4 h-4"></i> Eficiencia y Rendimiento</h3>
                    <div class="flex-1 flex flex-col justify-around">
                        <div class="group">
                            <div class="flex justify-between items-end mb-1"><span class="text-xs font-bold text-slate-500 uppercase">Margen Operativo</span><span class="text-sm font-black text-slate-800">${margenOperativo}%</span></div>
                            <div class="w-full bg-slate-100 rounded-full h-2.5 mb-1"><div class="bg-blue-500 h-2.5 rounded-full" style="width: ${Math.min(margenOperativo, 100)}%"></div></div>
                            <p class="text-[10px] text-slate-400 opacity-80 group-hover:opacity-100 transition-opacity">Mide la rentabilidad directa: cuánto del ingreso se convierte en utilidad neta tras descontar los gastos de operación del viaje.</p>
                        </div>
                        <div class="group">
                            <div class="flex justify-between items-end mb-1"><span class="text-xs font-bold text-slate-500 uppercase">Eficiencia Recaudo</span><span class="text-sm font-black text-slate-800">${eficienciaRecaudo}%</span></div>
                            <div class="w-full bg-slate-100 rounded-full h-2.5 mb-1"><div class="bg-green-500 h-2.5 rounded-full" style="width: ${Math.min(eficienciaRecaudo, 100)}%"></div></div>
                            <p class="text-[10px] text-slate-400 opacity-80 group-hover:opacity-100 transition-opacity">Indica qué porcentaje del ingreso facturado ya ha sido cobrado e ingresado en caja (libre de cartera pendiente).</p>
                        </div>
                        <div class="group">
                            <div class="flex justify-between items-end mb-1"><span class="text-xs font-bold text-slate-500 uppercase">Retorno de Inversión (ROI)</span><span class="text-sm font-black text-slate-800">${roi}%</span></div>
                            <div class="w-full bg-slate-100 rounded-full h-2.5 mb-1"><div class="bg-indigo-500 h-2.5 rounded-full" style="width: ${Math.min(roi, 100)}%"></div></div>
                            <p class="text-[10px] text-slate-400 opacity-80 group-hover:opacity-100 transition-opacity">Evalúa la eficiencia de la inversión global mostrando la relación entre la utilidad generada y el capital aportado por los socios.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
    },

    renderViajes: () => `
        <div class="space-y-6 animate-fade-in print:hidden">
            <div class="flex justify-between items-center">
                <div><h2 class="text-2xl font-bold">Gestión de Viajes</h2><p class="text-sm text-slate-500">Historial y cruce operativo</p></div>
                <button onclick="App.state.isAddViajeOpen=true; App.render()" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl shadow-sm font-bold hover:bg-blue-700 flex items-center"><i data-lucide="plus" class="w-4 h-4 mr-2"></i> Nuevo Viaje</button>
            </div>
            <div class="grid gap-3">
                ${[...App.state.viajes].reverse().map(v => `
                <div onclick="App.openModalViaje(${v.id})" class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center cursor-pointer hover:border-blue-300 transition-colors">
                    <div class="flex items-center">
                        <div class="bg-slate-100 p-3 rounded-lg mr-4"><i data-lucide="map" class="w-5 h-5 text-slate-600"></i></div>
                        <div>
                            <h4 class="font-bold text-slate-800">${v.viaje} <span class="text-xs text-slate-400 font-normal ml-2">${v.fecha} • ${v.periodo}</span></h4>
                            <p class="text-sm text-slate-500">${v.ruta}</p>
                        </div>
                    </div>
                    <div class="flex space-x-6 text-right">
                        <div class="hidden sm:block"><p class="text-[10px] uppercase font-bold text-slate-400">Ingreso Recaudado</p><p class="font-bold text-slate-700">${formatCOP(v.ingresoRecaudado)}</p></div>
                        <div><p class="text-[10px] uppercase font-bold text-slate-400">Utilidad Bruta</p><p class="font-black text-green-600">${formatCOP(v.utilidadBruta)}</p></div>
                    </div>
                </div>`).join('')}
            </div>
        </div>`,

    renderCartera: () => {
        const s = App.state;
        const cv = s.carteraViajeFiltro === 'Todos' ? s.carteraViajes : s.carteraViajes.filter(v => v.viaje === s.carteraViajeFiltro);
        const totalFiltro = cv.reduce((sum, i) => sum + i.valor, 0);

        return `
        <div class="space-y-6 animate-fade-in print:hidden">
            <div class="flex justify-between items-center">
                <div><h2 class="text-2xl font-bold">Cartera de Clientes</h2><p class="text-sm text-slate-500">Deudas consolidadas y cotejadas</p></div>
                <div class="bg-orange-100 text-orange-800 px-4 py-2.5 rounded-xl font-black border border-orange-200 shadow-sm">Total Exigible: ${formatCOP(App.getTotales().carteraTotal)}</div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead><tr class="bg-slate-50 border-b text-slate-500 text-xs uppercase font-bold"><th class="p-4">Cliente</th><th class="p-4">Concepto General</th><th class="p-4">Estado</th><th class="p-4 text-right">Total Adeudado</th></tr></thead>
                        <tbody>
                            ${s.carteraClientes.map(c => `
                            <tr onclick="App.openModalCliente('${c.cliente}')" class="border-b hover:bg-slate-50 cursor-pointer transition-colors">
                                <td class="p-4 font-bold text-slate-800">${c.cliente}</td><td class="p-4 text-sm text-slate-600">${c.conceptoGeneral}</td>
                                <td class="p-4"><span class="text-[10px] font-bold uppercase bg-orange-100 text-orange-700 px-2 py-1 rounded-md border border-orange-200">${c.estado}</span></td>
                                <td class="p-4 text-right font-black text-orange-600">${formatCOP(c.valorTotal)}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="mt-8">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold flex items-center"><i data-lucide="ship" class="mr-2 text-slate-400 w-5 h-5"></i> Desglose Cotejado por Viaje</h3>

            <div class="bg-blue-50 border border-blue-200 p-5 rounded-2xl flex justify-between items-center shadow-sm">
                <span class="text-blue-900 font-bold">Total Utilidad a Repartir (${s.sociedadFiltroMes}):</span>
                <span class="text-blue-700 font-black text-3xl">${formatCOP(utilidadPeriodo)}</span>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[900px]">
                        <thead><tr class="bg-slate-800 border-b text-white text-xs uppercase font-bold"><th class="p-4">Socio Inversionista</th><th class="p-4 text-center">% Part.</th><th class="p-4 text-right">Inversión Base</th><th class="p-4 text-right">Utilidad Causada</th><th class="p-4 text-right">Deuda Mantenimiento</th><th class="p-4 text-right bg-green-600">Saldo Líquido Actual</th></tr></thead>
                        <tbody>
                            ${s.socios.map(socio => {
                                // Calculo dinámico según filtro
                                const utilBruta = s.sociedadFiltroMes === 'Todos' ? socio.utilidadCausada : utilidadPeriodo * (socio.porcentaje / 100);
                                let liquido = utilBruta;
                                if (socio.saldoMantenimiento < 0 && s.sociedadFiltroMes === 'Todos') {
                                    const deudaAbs = Math.abs(socio.saldoMantenimiento);
                                    liquido = utilBruta - deudaAbs; // Permite mostrar saldo negativo real para PRI
                                }
                                
                                return `
                                <tr class="border-b hover:bg-slate-50 transition-colors">
                                    <td class="p-4 flex items-center"><div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center font-bold text-slate-600 mr-3 shadow-sm border">${socio.nombre.charAt(0)}</div><span class="font-bold text-slate-800">${socio.nombre}</span></td>
                                    <td class="p-4 text-center font-black text-blue-600 bg-blue-50/30">${socio.porcentaje}%</td>
                                    <td class="p-4 text-right text-sm font-medium text-slate-600">${formatCOP(socio.inversion)}</td>
                                    <td class="p-4 text-right font-bold text-slate-700">${formatCOP(utilBruta)}</td>
                                    <td class="p-4 text-right text-xs"><span class="${socio.saldoMantenimiento < 0 ? 'text-red-600 font-black bg-red-50 border border-red-100 px-2 py-1.5 rounded-lg shadow-sm' : 'text-slate-400 font-medium'}">${socio.saldoMantenimiento < 0 ? formatCOP(socio.saldoMantenimiento) : 'A Paz y Salvo'}</span></td>
                                    <td class="p-4 text-right bg-green-50/50 font-black text-lg ${liquido > 0 ? 'text-green-600' : (liquido < 0 ? 'text-red-600' : 'text-slate-400')}">${formatCOP(liquido)}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
            ${s.sociedadFiltroMes === 'Todos' ? `<p class="text-xs text-slate-500 italic mt-2"><i data-lucide="info" class="w-3 h-3 inline"></i> Nota: El saldo líquido en rojo indica una deuda del socio hacia la empresa que deberá cruzarse con futuras utilidades.</p>` : ''}
        </div>`;
    },

    renderModals: () => {
        let h = ''; const s = App.state;

        // Modal Form Viaje
        if (s.isAddViajeOpen) h += `<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4"><div class="bg-white w-full max-w-md rounded-2xl p-6 animate-slide-up shadow-2xl"><div class="flex justify-between items-center mb-5"><h3 class="font-black text-xl text-slate-800">Registrar Viaje Operativo</h3><button onclick="App.closeModals()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button></div><form onsubmit="App.submitViaje(event)" class="space-y-4"><div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Fecha de Cierre</label><input name="fecha" type="date" required class="w-full border-2 border-slate-200 p-2.5 rounded-xl text-sm focus:border-blue-500 focus:ring-0 outline-none transition-colors"/></div><div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Ruta</label><input name="ruta" type="text" placeholder="Ej: B/tura - Charco" required class="w-full border-2 border-slate-200 p-2.5 rounded-xl text-sm focus:border-blue-500 focus:ring-0 outline-none transition-colors"/></div><div class="grid grid-cols-2 gap-4"><div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Ingreso Bruto ($)</label><input name="ingreso" type="number" placeholder="Ej: 80000000" required class="w-full border-2 border-slate-200 p-2.5 rounded-xl text-sm focus:border-blue-500 focus:ring-0 outline-none transition-colors"/></div><div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Gastos Operativos ($)</label><input name="gastos" type="number" placeholder="Ej: 22000000" required class="w-full border-2 border-slate-200 p-2.5 rounded-xl text-sm focus:border-blue-500 focus:ring-0 outline-none transition-colors"/></div></div><div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Monto a Cartera (Deuda)</label><input name="cartera" type="number" placeholder="Si todo se pagó, deja 0" class="w-full border-2 border-orange-200 bg-orange-50 p-2.5 rounded-xl text-sm focus:border-orange-500 focus:ring-0 outline-none transition-colors"/></div><div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Observaciones</label><textarea name="observaciones" placeholder="Detalles de la carga, responsables, etc." class="w-full border-2 border-slate-200 p-2.5 rounded-xl text-sm focus:border-blue-500 focus:ring-0 outline-none transition-colors h-20 resize-none"></textarea></div><button type="submit" class="w-full bg-blue-600 text-white font-black py-3.5 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-all mt-2">Guardar Registro Consolidado</button></form></div></div>`;
        
        // Modal Form Cliente
        if (s.isAddClienteOpen) h += `<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4"><div class="bg-white w-full max-w-md rounded-2xl p-6 animate-slide-up shadow-2xl"><div class="flex justify-between items-center mb-5"><h3 class="font-black text-xl text-slate-800">Registrar Cliente</h3><button onclick="App.closeModals()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button></div><form onsubmit="App.submitCliente(event)" class="space-y-4"><input name="nombre" type="text" placeholder="Nombre Comercial / Contacto" required class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none"/><input name="telefono" type="text" placeholder="Teléfono" required class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none"/><input name="ubicacion" type="text" placeholder="Ubicación" required class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none"/><select name="tipo" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none bg-white"><option>Comerciante de Madera</option><option>Materiales Construcción</option><option>Equipos e Insumos</option><option>General</option></select><button type="submit" class="w-full bg-slate-900 text-white font-black py-3.5 rounded-xl hover:bg-slate-800 shadow-lg transition-all mt-2">Guardar Cliente en Directorio</button></form></div></div>`;
        
        // Modal Form Nómina
        if (s.isAddNominaOpen) {
            const tN = formatCOP(s.nomina.reduce((a, c) => a + (c.valorDia * c.dias), 0));
            h += `<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4"><div class="bg-white w-full max-w-sm rounded-2xl p-6 animate-slide-up shadow-2xl"><div class="flex justify-between items-center mb-5"><h3 class="font-black text-xl text-slate-800">Liquidar Viaje</h3><button onclick="App.closeModals()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button></div><form onsubmit="App.submitNomina(event)" class="space-y-4"><input name="fecha" type="date" required class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none"/><select name="viaje" required class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none bg-white"><option value="">Seleccione Viaje a Liquidar</option>${s.viajes.map(v => `<option value="${v.viaje}">${v.viaje} (${v.periodo})</option>`).join('')}</select><div class="bg-blue-50 border border-blue-100 p-5 rounded-xl text-center mt-6 shadow-inner"><p class="text-xs font-bold text-blue-800 uppercase tracking-widest mb-1">Total a Liquidar</p><p class="text-3xl font-black text-blue-600 drop-shadow-sm">${tN}</p></div><button type="submit" class="w-full bg-slate-900 text-white font-black py-3.5 rounded-xl hover:bg-slate-800 shadow-lg transition-all mt-4">Confirmar y Guardar</button></form></div></div>`;
        }

        // Modal Detalle Viaje
        if (s.selectedViaje) {
            const v = s.selectedViaje;
            h += `<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4" onclick="App.closeModals()">
                <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden animate-slide-up shadow-2xl" onclick="event.stopPropagation()">
                    <div class="p-5 border-b bg-slate-50 flex justify-between items-center">
                        <div><h3 class="font-black text-xl text-slate-800">${v.viaje}</h3><p class="text-xs font-bold text-slate-500 uppercase">${v.periodo} • ${v.fecha}</p></div>
                        <button onclick="App.closeModals()" class="bg-slate-200 p-2 rounded-full text-slate-500 hover:bg-slate-300 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div class="p-6 space-y-5">
                        <div class="flex justify-between items-center border-b border-slate-100 pb-4"><span class="text-sm font-bold text-slate-500 uppercase">Ruta</span><span class="font-black text-slate-800 bg-slate-100 px-3 py-1 rounded-lg">${v.ruta}</span></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100"><p class="text-xs text-blue-700 font-bold uppercase mb-1">Ingreso Bruto</p><p class="font-black text-lg text-blue-900">${formatCOP(v.ingreso)}</p></div>
                            <div class="bg-red-50 p-4 rounded-2xl border border-red-100"><p class="text-xs text-red-700 font-bold uppercase mb-1">Costos Operativos</p><p class="font-black text-lg text-red-900">${formatCOP(v.gastos)}</p></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-green-50 p-4 rounded-2xl border border-green-100"><p class="text-xs text-green-700 font-bold uppercase mb-1">Utilidad Bruta</p><p class="font-black text-lg text-green-900">${formatCOP(v.utilidadBruta)}</p></div>
                            <div class="bg-orange-50 p-4 rounded-2xl border border-orange-100"><p class="text-xs text-orange-700 font-bold uppercase mb-1">Cuentas x Cobrar</p><p class="font-black text-lg text-orange-900">${formatCOP(v.cartera)}</p></div>
                        </div>
                        <div class="bg-slate-800 p-4 rounded-2xl flex justify-between items-center shadow-inner">
                            <span class="font-bold text-slate-300 text-sm uppercase tracking-wide">Ingreso Recaudado</span>
                            <span class="font-black text-2xl text-white">${formatCOP(v.ingresoRecaudado)}</span>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 text-sm">
                            <p class="font-bold text-slate-700 mb-1 flex items-center"><i data-lucide="file-text" class="w-4 h-4 mr-1"></i> Observaciones Generales</p>
                            <p class="text-slate-600">${v.observaciones}</p>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        // Modal Detalle Cliente (Cartera)
        if (s.selectedCliente) {
            const c = s.selectedCliente;
            const viajesDeuda = s.carteraViajes.filter(cv => cv.cliente.includes(c.cliente));
            h += `<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4" onclick="App.closeModals()">
                <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden animate-slide-up shadow-2xl" onclick="event.stopPropagation()">
                    <div class="p-5 border-b bg-slate-50 flex justify-between items-center">
                        <h3 class="font-black text-xl text-slate-800 flex items-center"><i data-lucide="user" class="w-6 h-6 mr-2 text-blue-600 bg-blue-100 p-1 rounded-md"></i> ${c.cliente}</h3>
                        <button onclick="App.closeModals()" class="bg-slate-200 p-2 rounded-full text-slate-500 hover:bg-slate-300 transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div class="p-6">
                        <div class="bg-orange-50 p-6 rounded-2xl border border-orange-200 text-center mb-6 shadow-inner">
                            <p class="text-xs text-orange-800 font-bold uppercase tracking-widest mb-2">Deuda Total Consolidada</p>
                            <p class="text-4xl font-black text-orange-600 drop-shadow-sm">${formatCOP(c.valorTotal)}</p>
                        </div>
                        <h4 class="font-bold text-slate-800 mb-3 text-sm flex items-center"><i data-lucide="list" class="w-4 h-4 mr-1 text-slate-400"></i> Detalle de Facturas/Viajes</h4>
                        <div class="space-y-2 mb-6 max-h-40 overflow-y-auto pr-2">
                            ${viajesDeuda.map(vd => `
                                <div class="bg-slate-50 border border-slate-100 p-3 rounded-xl flex justify-between items-center">
                                    <div><p class="font-bold text-slate-700 text-sm">${vd.viaje}</p><p class="text-xs text-slate-500">${vd.concepto}</p></div>
                                    <span class="font-black text-orange-600">${formatCOP(vd.valor)}</span>
                                </div>
                            `).join('')}
                        </div>
                        <button class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-lg hover:bg-slate-800 shadow-lg shadow-slate-900/20 transition-all flex items-center justify-center">
                            <i data-lucide="check-circle-2" class="w-5 h-5 mr-2"></i> Registrar Abono o Pago Total
                        </button>
                    </div>
                </div>
            </div>`;
        }

        return h;
    },

    // Orquestador de Renderizado
    render: () => {
        const root = document.getElementById('app-root');
        
        let mainContent = '';
        switch(App.state.activeTab) {
            case 'dashboard': mainContent = App.renderDashboard(); break;
            case 'viajes': mainContent = App.renderViajes(); break;
            case 'cartera': mainContent = App.renderCartera(); break;
            case 'documentos': mainContent = App.renderDocumentos(); break;
            case 'nomina': mainContent = App.renderNomina(); break;
            case 'clientes': mainContent = App.renderClientes(); break;
            case 'finanzas': mainContent = App.renderNIIF(); break;
            case 'sociedad': mainContent = App.renderSociedad(); break;
        }

        // Estructura Base Global
        root.innerHTML = `
            ${App.renderModals()}
            <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center z-10 shrink-0 print:hidden shadow-sm">
                <h1 class="text-xl font-black text-slate-800 flex items-center tracking-tight"><i data-lucide="anchor" class="mr-2 text-blue-600 w-6 h-6"></i> Don Sebe ERP</h1>
                <div class="bg-slate-900 text-white px-4 py-1.5 rounded-full text-xs font-bold shadow-md flex items-center"><div class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></div> Administrador</div>
            </header>
            
            <main class="flex-1 overflow-y-auto p-4 md:p-6 pb-24 bg-slate-50 print:bg-white print:p-0">
                <div class="max-w-6xl mx-auto">${mainContent}</div>
            </main>

            <nav class="bg-white border-t border-slate-200 shrink-0 pb-safe fixed bottom-0 w-full z-40 print:hidden shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <div class="max-w-6xl mx-auto flex justify-between overflow-x-auto hide-scroll px-2">
                    ${App.navItems.map(item => `
                        <button onclick="App.setTab('${item.id}')" class="flex flex-col items-center p-3 min-w-[4.5rem] relative transition-colors ${App.state.activeTab === item.id ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}">
                            <i data-lucide="${item.icon}" class="w-5 h-5 mb-1 transition-transform ${App.state.activeTab === item.id ? 'scale-110' : ''}"></i>
                            <span class="text-[10px] font-bold">${item.label}</span>
                            ${App.state.activeTab === item.id ? '<div class="absolute top-0 w-8 h-1 bg-blue-600 rounded-b-full"></div>' : ''}
                        </button>
                    `).join('')}
                </div>
            </nav>
        `;

        lucide.createIcons();

        // Renderizado gráfico Avanzado en Dashboard
        if(App.state.activeTab === 'dashboard') {
            const ctx = document.getElementById('lineChart');
            if(ctx) {
                // Extrayendo datos de la simulación de periodos para la gráfica
                const s = App.state;
                const labels = s.informePeriodos.map(p => p.periodo.split(' ')[0]); // Oct-Nov, Diciembre, Enero
                const ingresosBrutos = s.informePeriodos.map(p => p.ingresoProy); 
                const utilidadesBrutas = s.informePeriodos.map(p => p.utilProy);
                const utilidadesNetas = s.informePeriodos.map(p => p.utilReal); // Recaudadas
                const costos = s.informePeriodos.map(p => p.ingresoProy - p.utilProy); // Estimación matemática basada en proyecciones

                if(window.dashChart) window.dashChart.destroy();
                window.dashChart = new Chart(ctx, {
                    type: 'line',
                    data: { 
                        labels: labels, 
                        datasets: [
                            { label: 'Ingresos Brutos', data: ingresosBrutos, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4, borderWidth: 3, fill: true }, 
                            { label: 'Costos (Gastos)', data: costos, borderColor: '#ef4444', backgroundColor: 'transparent', tension: 0.4, borderWidth: 2, borderDash: [5, 5] },
                            { label: 'Utilidades Brutas', data: utilidadesBrutas, borderColor: '#10b981', backgroundColor: 'transparent', tension: 0.4, borderWidth: 2 },
                            { label: 'Utilidades Netas (Recaudo Real)', data: utilidadesNetas, borderColor: '#0f766e', backgroundColor: 'rgba(15, 118, 110, 0.1)', tension: 0.4, borderWidth: 4, fill: true }
                        ]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false, 
                        interaction: { mode: 'index', intersect: false },
                        plugins: { 
                            legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8, font: { weight: 'bold' } } },
                            tooltip: { callbacks: { label: function(context) { return context.dataset.label + ': ' + formatCOP(context.parsed.y); } } }
                        }, 
                        scales: { 
                            y: { 
                                beginAtZero: true, 
                                grid: { color: '#f1f5f9' },
                                ticks: { 
                                    font: { weight: 'bold' },
                                    color: '#94a3b8',
                                    callback: function(value) { return '$' + (value / 1000000) + 'M'; } 
                                } 
                            },
                            x: { grid: { display: false }, ticks: { font: { weight: 'bold' }, color: '#64748b' } }
                        } 
                    }
                });
            }
        }
    }
};

// Inicialización del Sistema
window.onload = () => {
    App.render();
};

</script>
</body>
</html>
