<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Don Sebe ERP - Sistema Operativo Completo</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icono.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para Informes Dinámicos -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HTML2PDF para Generación Real de Documentos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        .animate-slide-up { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .table-scroll { -webkit-overflow-scrolling: touch; }

        /* Contenedor seguro para renderizado PDF (No display: none, sino off-screen) */
        #pdf-render-engine {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 800px;
            background: white;
            color: black;
            font-family: Arial, sans-serif;
            z-index: -1000;
        }

        .pdf-page-break { page-break-before: always; margin-top: 40px; }
        .pdf-no-break { page-break-inside: avoid; }
    </style>
</head>
<body class="flex flex-col h-screen bg-slate-50 font-sans overflow-hidden text-slate-800">

    <!-- Contenedor Dinámico Principal -->
    <div id="app-root" class="flex flex-col h-full w-full relative"></div>
    
    <!-- Capa de Pre-Renderizado para PDF -->
    <div id="pdf-render-engine"></div>

<script>
/**
 * ==========================================
 * NÚCLEO DEL SISTEMA (STATE MANAGEMENT)
 * ==========================================
 */

const formatCOP = (value) => new Intl.NumberFormat('es-CO', {
    style: 'currency', currency: 'COP', minimumFractionDigits: 0, maximumFractionDigits: 0
}).format(value || 0);

const App = {
    state: {
        activeTab: 'dashboard',
        niifTab: 'informe-consolidado',
        docTab: 'escaner',
        sociedadFiltroMes: 'Todos',
        carteraViajeFiltro: 'Todos',
        viajesFiltroMes: 'Todos',
        viajesFiltroRuta: 'Todos',
        informePdfFiltro: 'Todos',
        isUploading: false,
        uploadSuccess: false,
        isExportingPDF: false,

        selectedViaje: null,
        selectedCliente: null,
        selectedPagoNomina: null,

            cliente: { nombre: '', nit: '', segmento: 'Persona Común', tipo: 'General', telefono: '', email: '', direccionFiscal: '', banco: '', cuentaBancaria: '', notas: '', ubicacion: '' },
            nomina: []
        },

        // Base de Datos Estática (Mocks)
        viajes: [
            { id: 1, fecha: '2025-10-25', viaje: 'Viaje #1', periodo: 'Oct-Nov 2025', ruta: 'B/tura - Satinga', ingresoBruto: 66956000, costosFijos: 20000000, costosVariables: 9107000, otrosCostos: 0, deducciones: 0, pagoFlete: 54545000, pagoCargue: 0, gastos: 29107000, utilidadBruta: 37849000, cartera: 12411000, ingresoRecaudado: 54545000, observaciones: 'Madera bajada', clientesAsociados: 'Oscar, Pepe', productos: 'Madera Aserrada' },
            { id: 2, fecha: '2025-11-09', viaje: 'Viaje #2', periodo: 'Oct-Nov 2025', ruta: 'B/tura - Satinga', ingresoBruto: 46440300, costosFijos: 15000000, costosVariables: 3340300, otrosCostos: 0, deducciones: 0, pagoFlete: 35356300, pagoCargue: 0, gastos: 18340300, utilidadBruta: 28100000, cartera: 11084000, ingresoRecaudado: 35356300, observaciones: 'Madera de exportación', clientesAsociados: 'Oscar', productos: 'Madera Fina' },
            { id: 3, fecha: '2025-11-19', viaje: 'Viaje #3', periodo: 'Oct-Nov 2025', ruta: 'B/tura - Charco', ingresoBruto: 73131000, costosFijos: 20000000, costosVariables: 6871000, otrosCostos: 0, deducciones: 0, pagoFlete: 73131000, pagoCargue: 0, gastos: 26871000, utilidadBruta: 46260000, cartera: 0, ingresoRecaudado: 73131000, observaciones: 'Flete pagado', clientesAsociados: 'Konny Hospital', productos: 'Equipos Médicos' },
            { id: 4, fecha: '2025-12-02', viaje: 'Viaje #4', periodo: 'Diciembre 2025', ruta: 'B/tura - Charco', ingresoBruto: 80023500, costosFijos: 18000000, costosVariables: 4800000, otrosCostos: 0, deducciones: 0, pagoFlete: 47904000, pagoCargue: 0, gastos: 22800000, utilidadBruta: 57223500, cartera: 32119500, ingresoRecaudado: 47904000, observaciones: 'Tubos, Grava', clientesAsociados: 'Alex, Oscar', productos: 'Material Construcción' }
        ],
        carteraViajes: [
            { id: 1, idViaje: 1, viaje: 'Viaje #1', cliente: 'Oscar', concepto: 'Madera bajada Satinga', valor: 12411000, fecha: '2025-10-25' },
            { id: 2, idViaje: 2, viaje: 'Viaje #2', cliente: 'Oscar', concepto: 'Madera bajada', valor: 11084000, fecha: '2025-11-09' },
            { id: 3, idViaje: 4, viaje: 'Viaje #4', cliente: 'Alex', concepto: 'Tubos La Tola', valor: 13000000, fecha: '2025-12-02' }
        ],
        clientesDir: [
            { id: 1, nombre: 'John Jairo Silva', tipo: 'Equipos e Insumos', segmento: 'Comerciante', nit: '111111111-1', telefono: '310 000 0000', email: 'john@empresa.com', direccionFiscal: 'Centro', banco: 'Bancolombia', cuentaBancaria: 'Ahorros 123-456-789', notas: 'Exige factura electrónica.', ubicacion: 'Buenaventura' },
            { id: 2, nombre: 'Oscar', tipo: 'Comerciante de Madera', segmento: 'Persona Común', nit: '222222222', telefono: '312 000 0000', email: 'N/A', direccionFiscal: 'Satinga', banco: 'N/A', cuentaBancaria: 'N/A', notas: 'Pago en efectivo.', ubicacion: 'Satinga' },
            { id: 3, nombre: 'Alex', tipo: 'Materiales Construcción', segmento: 'Comerciante', nit: '333333333-3', telefono: '315 000 0000', email: 'alex@tola.com', direccionFiscal: 'La Tola', banco: 'Bogotá', cuentaBancaria: 'Cte 987-654', notas: 'Grandes volúmenes.', ubicacion: 'La Tola' }
        ],
        carteraClientes: [
            { id: 1, cliente: 'John Jairo Silva', conceptoGeneral: 'Equipos e insumos', valorTotal: 41300000, viajesAsociados: 'Histórico', estado: 'Pendiente' },
            { id: 2, cliente: 'Oscar', conceptoGeneral: 'Madera (Satinga)', valorTotal: 31704500, viajesAsociados: 'Viaje #1, #2, #4', estado: 'Pendiente' },
            { id: 3, cliente: 'Alex', conceptoGeneral: 'Construcción Tola', valorTotal: 31400000, viajesAsociados: 'Viaje #4', estado: 'Pendiente' }
        ],
        socios: [
            { nombre: 'PRI (Socio 40%)', porcentaje: 40.0, inversion: 447637320, saldoMantenimiento: -81900472, utilidadCausada: 69689184 },
            { nombre: 'Enel-Luz', porcentaje: 39.0, inversion: 766593300, saldoMantenimiento: 0, utilidadCausada: 67946954 },
            { nombre: 'Roel', porcentaje: 15.0, inversion: 277500000, saldoMantenimiento: 0, utilidadCausada: 26133444 }
        ],
        nominaBase: [
            { id: 1, cargo: 'Capitán', valorDia: 190000, diasDefault: 5 },
            { id: 2, cargo: 'Marinero 1', valorDia: 80000, diasDefault: 5 },
            { id: 3, cargo: 'Cocinero', valorDia: 80000, diasDefault: 5 },
            { id: 4, cargo: 'Maquinista 1', valorDia: 120000, diasDefault: 5 }
        ],
        pagosNomina: [
            { id: 1, fecha: '2025-10-30', viaje: 'Viaje #1', valor: 3200000, estado: 'Pagado', detalle: 'Tripulación completa (5 días)', extra: 'Productos: Madera | Clientes: Oscar', tripulantes: [{cargo: 'Capitán', valor: 950000, dias: 5}, {cargo: 'Marinero 1', valor: 400000, dias: 5}, {cargo: 'Cocinero', valor: 400000, dias: 5}, {cargo: 'Maquinista 1', valor: 600000, dias: 5}] }
        ],
        informePeriodos: [
            { periodo: 'Oct-Nov 2025', ingresoProy: 186527300, ingresoReal: 163032300, utilProy: 112209000, utilReal: 88714000, cartera: 23495000 },
            { periodo: 'Diciembre 2025', ingresoProy: 114851610, ingresoReal: 82732110, utilProy: 77226610, utilReal: 45107110, cartera: 32119500 },
            { periodo: 'Enero 2026', ingresoProy: 107125600, ingresoReal: 52325600, utilProy: 77125600, utilReal: 22325600, cartera: 54800000 },
        ]
    },

    navItems: [
        { id: 'dashboard', label: 'Inicio', icon: 'trending-up' },
        { id: 'viajes', label: 'Viajes', icon: 'ship' },
        { id: 'finanzas', label: 'NIIF', icon: 'landmark' },
        { id: 'cartera', label: 'Cartera', icon: 'wallet' },
        { id: 'nomina', label: 'Nómina', icon: 'users' },
        { id: 'sociedad', label: 'Sociedad', icon: 'anchor' },
        { id: 'clientes', label: 'Clientes', icon: 'contact' }
    ],

    // Handlers
    setTab: (tab) => { App.state.activeTab = tab; App.render(); },
    setNiifTab: (tab) => { App.state.niifTab = tab; App.render(); },
    setFilterVal: (key, val) => { App.state[key] = val; App.render(); },
    
    // Numpad Nativo Refinado
    openNumpad: (targetField, label) => {
        App.state.numpad.isOpen = true;
        App.state.numpad.targetField = targetField;
        App.state.numpad.targetLabel = label;
        let currentVal = App.state.formTemp.viaje[targetField];
        App.state.numpad.value = (currentVal === null || currentVal === undefined || isNaN(currentVal)) ? '0' : currentVal.toString();
        App.render();
    },
    handleNumpadClick: (key) => {
        let val = App.state.numpad.value || '0';
        if(key === 'DEL') { 
            val = val.length > 1 ? val.slice(0, -1) : '0'; 
        } else if(key === 'CLEAR') { 
            val = '0'; 
        } else {
            if(val.length > 11) return; 
            if (val === '0') val = key === '000' ? '0' : key; 
            else val += key;
        }
        App.state.numpad.value = val;
        App.state.formTemp.viaje[App.state.numpad.targetField] = parseInt(val, 10) || 0;
        App.render();
    },
    closeNumpad: () => { App.state.numpad.isOpen = false; App.render(); },

    // Calculadoras Globales
    getTotales: () => {
        const s = App.state;
        const tViajes = s.informePdfFiltro === 'Todos' ? s.viajes : s.viajes.filter(v => v.periodo === s.informePdfFiltro);
        
        const ingresoTotal = tViajes.reduce((acc, curr) => acc + Number(curr.ingresoBruto || curr.ingreso), 0);
        const gastoTotal = tViajes.reduce((acc, curr) => acc + Number(curr.gastos), 0);
        const utilidadBruta = tViajes.reduce((acc, curr) => acc + Number(curr.utilidadBruta), 0);
        const carteraTotal = s.carteraClientes.reduce((acc, curr) => acc + Number(curr.valorTotal), 0); // Cartera global
        const utilidadNeta = ingresoTotal - gastoTotal; 
        const ingresoRecaudado = ingresoTotal - carteraTotal;
        const inversionTotal = s.socios.reduce((acc, curr) => acc + curr.inversion, 0);
        return { ingresoTotal, gastoTotal, utilidadBruta, carteraTotal, utilidadNeta, ingresoRecaudado, inversionTotal };
    },

    // ==========================================
    // EXPORTACIÓN PDF (MOTOR MEJORADO)
    // ==========================================
    exportToPDF: () => {
        App.state.isExportingPDF = true;
        App.render();

        setTimeout(() => {
            const pdfEngine = document.getElementById('pdf-render-engine');
            pdfEngine.innerHTML = App.renderFullPDFReport();
            
            // Forzar carga de la capa
            pdfEngine.style.left = '0';
            pdfEngine.style.visibility = 'hidden';

            const opt = {
                margin:       [10, 10, 10, 10],
                filename:     `Informe_NIIF_Don_Sebe.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(pdfEngine).save().then(() => {
                pdfEngine.innerHTML = '';
                pdfEngine.style.left = '-9999px';
                pdfEngine.style.visibility = 'visible';
                App.state.isExportingPDF = false;
                App.render();
            }).catch(err => {
                console.error(err);
                App.state.isExportingPDF = false;
                App.render();
            });
        }, 800); // Dar tiempo al DOM de procesar el template literal
    },

    renderFullPDFReport: () => {
        const t = App.getTotales(); const s = App.state;
        let pInfo = s.informePdfFiltro !== 'Todos' ? s.informePeriodos.filter(p => p.periodo === s.informePdfFiltro) : s.informePeriodos;

        return `
        <div style="padding: 20px; font-family: Arial, sans-serif; color: #1e293b; background: white;">
            <div style="text-align: center; border-bottom: 3px solid #1e293b; padding-bottom: 20px; margin-bottom: 20px;">
                <h1 style="font-size: 24px; font-weight: bold; text-transform: uppercase; margin: 0;">Auditoría NIIF y Resultados</h1>
                <h2 style="font-size: 16px; margin: 5px 0;">M/N Greicy Jireth - Transporte Marítimo</h2>
                <p style="font-size: 12px; color: #64748b;">Filtro de Datos: ${s.informePdfFiltro}</p>
            </div>

            <!-- Cap 1 -->
            <div style="margin-bottom: 30px;">
                <h3 style="font-size: 14px; background: #f1f5f9; padding: 6px; border-left: 4px solid #1e293b; margin-bottom: 10px;">1. COMPARATIVO CONSOLIDADO</h3>
                <table style="width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 10px;">
                    <tr style="background: #e2e8f0;"><th style="padding: 6px; border: 1px solid #cbd5e1;">Periodo</th><th style="padding: 6px; border: 1px solid #cbd5e1;">Ingreso Proy.</th><th style="padding: 6px; border: 1px solid #cbd5e1;">Ingreso Real</th><th style="padding: 6px; border: 1px solid #cbd5e1;">Utilidad Caja</th><th style="padding: 6px; border: 1px solid #cbd5e1;">Cartera Acum.</th></tr>
                    ${pInfo.map(p => `<tr><td style="padding: 6px; border: 1px solid #cbd5e1;">${p.periodo}</td><td style="padding: 6px; border: 1px solid #cbd5e1; text-align: right;">${formatCOP(p.ingresoProy)}</td><td style="padding: 6px; border: 1px solid #cbd5e1; text-align: right;">${formatCOP(p.ingresoReal)}</td><td style="padding: 6px; border: 1px solid #cbd5e1; text-align: right; color: green; font-weight: bold;">${formatCOP(p.utilReal)}</td><td style="padding: 6px; border: 1px solid #cbd5e1; text-align: right; color: red;">${formatCOP(p.cartera)}</td></tr>`).join('')}
                </table>
            </div>

            <!-- Cap 2 & 3 -->
            <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                <div style="flex: 1; border: 1px solid #cbd5e1; padding: 10px;">
                    <h3 style="font-size: 14px; background: #f1f5f9; padding: 6px; border-left: 4px solid #1e293b; margin-bottom: 10px;">2. BALANCE GENERAL</h3>
                    <div style="font-size: 11px; margin-bottom: 10px;"><b>Activos:</b> ${formatCOP(t.inversionTotal + t.utilidadNeta)}<br><b>Pasivos:</b> ${formatCOP(81900472)}<br><b>Patrimonio:</b> ${formatCOP(t.inversionTotal + (t.utilidadNeta - 81900472))}</div>
                </div>
                <div style="flex: 1; border: 1px solid #cbd5e1; padding: 10px;">
                    <h3 style="font-size: 14px; background: #f1f5f9; padding: 6px; border-left: 4px solid #1e293b; margin-bottom: 10px;">3. ESTADO DE RESULTADOS</h3>
                    <div style="font-size: 11px;"><b>Ingresos Operativos:</b> ${formatCOP(t.ingresoTotal)}<br><span style="color: red;"><b>(-) Costos:</b> ${formatCOP(t.gastoTotal)}</span><br><br><b style="font-size: 14px; color: green;">Utilidad Neta: ${formatCOP(t.utilidadNeta)}</b></div>
                </div>
            </div>

            <!-- Cap 6 Sociedad -->
            <div class="pdf-page-break">
                <h3 style="font-size: 14px; background: #f1f5f9; padding: 6px; border-left: 4px solid #1e293b; margin-bottom: 10px;">6. RENDIMIENTO SOCIETARIO (ROI)</h3>
                <table style="width: 100%; border-collapse: collapse; font-size: 10px;">
                    <tr style="background: #1e293b; color: white;"><th style="padding: 6px;">Socio</th><th style="padding: 6px;">Part %</th><th style="padding: 6px;">ROI %</th><th style="padding: 6px; text-align: right;">Inversión Base</th><th style="padding: 6px; text-align: right;">Utilidad</th><th style="padding: 6px; text-align: right;">Deuda</th><th style="padding: 6px; text-align: right;">Saldo Líquido</th></tr>
                    ${s.socios.map(soc => {
                        const utilBruta = s.informePdfFiltro === 'Todos' ? soc.utilidadCausada : t.utilidadBruta * (soc.porcentaje / 100);
                        let liquido = utilBruta;
                        if (soc.saldoMantenimiento < 0 && s.informePdfFiltro === 'Todos') liquido = utilBruta - Math.abs(soc.saldoMantenimiento);
                        return `<tr><td style="padding: 6px; border-bottom: 1px solid #e2e8f0; font-weight: bold;">${soc.nombre}</td><td style="padding: 6px; border-bottom: 1px solid #e2e8f0;">${soc.porcentaje}%</td><td style="padding: 6px; border-bottom: 1px solid #e2e8f0; font-weight: bold; color: blue;">${((utilBruta/soc.inversion)*100).toFixed(1)}%</td><td style="padding: 6px; border-bottom: 1px solid #e2e8f0; text-align: right;">${formatCOP(soc.inversion)}</td><td style="padding: 6px; border-bottom: 1px solid #e2e8f0; text-align: right;">${formatCOP(utilBruta)}</td><td style="padding: 6px; border-bottom: 1px solid #e2e8f0; text-align: right; color: red;">${soc.saldoMantenimiento < 0 ? formatCOP(soc.saldoMantenimiento) : '0'}</td><td style="padding: 6px; border-bottom: 1px solid #e2e8f0; text-align: right; font-weight: bold;">${formatCOP(liquido)}</td></tr>`;
                    }).join('')}
                </table>
            </div>
            
            <p style="text-align: center; font-size: 9px; margin-top: 30px; color: #94a3b8;">Documento PDF Generado por Don Sebe ERP. Auditoría Automática.</p>
        </div>`;
    },

    // ==========================================
    // RENDER DE VISTAS (UI)
    // ==========================================
    renderNIIF: () => {
        const s = App.state;
        return `
        <div class="space-y-4 animate-fade-in print:hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center">
                <h2 class="text-xl font-black flex items-center text-slate-800"><i data-lucide="landmark" class="mr-2 text-blue-600 w-6 h-6"></i> NIIF & Auditoría</h2>
            </div>
            
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex items-center w-full sm:w-auto">
                    <i data-lucide="filter" class="w-4 h-4 text-slate-400 mr-2"></i>
                    <select onchange="App.setFilterVal('informePdfFiltro', this.value)" class="w-full sm:w-auto border border-slate-300 rounded-lg p-2 text-sm focus:ring focus:ring-blue-200 outline-none font-medium">
                        <option value="Todos">Periodo Completo Histórico</option>
                        ${s.informePeriodos.map(p => `<option value="${p.periodo}" ${s.informePdfFiltro === p.periodo ? 'selected':''}>${p.periodo}</option>`).join('')}
                    </select>
                </div>
                <button onclick="App.exportToPDF()" class="w-full sm:w-auto bg-red-600 text-white px-5 py-2 rounded-xl text-sm font-bold flex justify-center items-center hover:bg-red-700 transition ${s.isExportingPDF ? 'opacity-50 cursor-not-allowed' : ''}">
                    ${s.isExportingPDF ? '<i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin"></i> Procesando PDF...' : '<i data-lucide="file-down" class="w-4 h-4 mr-2"></i> Exportar Informe en PDF'}
                </button>
            </div>

            <div class="flex space-x-2 overflow-x-auto hide-scroll pb-1">
                ${[
                    { id: 'informe-consolidado', label: 'Consolidado' },
                    { id: 'estado-situacion', label: 'Balance General' },
                    { id: 'resultados', label: 'P&G' },
                    { id: 'flujo-efectivo', label: 'Flujo Efectivo' },
                    { id: 'patrimonio', label: 'Patrimonio' }
                ].map(tab => `
                    <button onclick="App.setNiifTab('${tab.id}')" class="px-4 py-2 rounded-xl text-xs font-bold border transition-colors shadow-sm whitespace-nowrap ${s.niifTab === tab.id ? 'bg-slate-800 text-white border-slate-900' : 'bg-white text-slate-600'}">${tab.label.toUpperCase()}</button>
                `).join('')}
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 min-h-[400px]">
                ${App.getNiifScreenContent()}
            </div>
        </div>`;
    },

    getNiifScreenContent: () => {
        const t = App.getTotales(); const s = App.state;
        let pInfo = s.informePdfFiltro !== 'Todos' ? s.informePeriodos.filter(p => p.periodo === s.informePdfFiltro) : s.informePeriodos;

        // Textos Dinámicos (Resúmenes de IA)
        let summaryText = "";
        let contentHTML = "";
        
        if(s.niifTab === 'informe-consolidado') {
            summaryText = `En el periodo filtrado, se evidencia una diferencia entre los ingresos proyectados y el flujo real de caja. La cartera viva impacta directamente la utilidad recaudada, situándose actualmente en ${formatCOP(t.carteraTotal)}.`;

    renderSociedad: () => {
        const s = App.state;
        const periodos = [...new Set(s.viajes.map(v => v.periodo))].sort();
        const vFiltro = s.sociedadFiltroMes === 'Todos' ? s.viajes : s.viajes.filter(v => v.periodo === s.sociedadFiltroMes);
        const utilidadPeriodo = vFiltro.reduce((acc, v) => acc + v.utilidadBruta, 0); 
        
        const t = App.getTotales();
        const tasaRecuperacion = ((t.utilidadNeta / t.inversionTotal) * 100).toFixed(2);
        const apalancamiento = ((81900472 / t.utilidadNeta) * 100).toFixed(2);

        return `
        <div class="space-y-6 animate-fade-in print:hidden">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 sm:gap-0">
                <div><h2 class="text-2xl font-bold">Rendimiento Societario</h2><p class="text-sm text-slate-500">Distribución y Retorno de Inversión (ROI)</p></div>
                <div class="flex items-center space-x-2 w-full sm:w-auto"><span class="text-sm font-bold text-slate-600 shrink-0">Periodo:</span>
                    <select onchange="App.setFilterVal('sociedadFiltroMes', this.value)" class="w-full sm:w-auto border border-slate-300 shadow-sm rounded-lg p-2.5 text-sm bg-white font-medium focus:ring focus:ring-blue-200 outline-none">
                        <option value="Todos" ${s.sociedadFiltroMes==='Todos'?'selected':''}>Histórico Total</option>
                        ${periodos.map(m => `<option value="${m}" ${s.sociedadFiltroMes===m?'selected':''}>${m}</option>`).join('')}
                    </select>
                </div>
            </div>

            <div class="bg-blue-50 border border-blue-200 p-4 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center shadow-sm">
                <span class="text-blue-900 font-bold">Masa de Utilidad a Repartir (${s.sociedadFiltroMes}):</span>
                <span class="text-blue-700 font-black text-2xl">${formatCOP(utilidadPeriodo)}</span>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <div class="w-full overflow-x-auto table-scroll">
                    <table class="w-full text-left border-collapse min-w-[900px]">
                        <thead><tr class="bg-slate-800 border-b text-white text-[10px] sm:text-xs uppercase font-bold"><th class="p-3">Inversionista</th><th class="p-3 text-center bg-indigo-900">ROI %</th><th class="p-3 text-right">Inversión Base</th><th class="p-3 text-right">Util. Causada</th><th class="p-3 text-right bg-green-600">Saldo Líquido Actual</th></tr></thead>
                        <tbody>
                            ${s.socios.map(socio => {
                                const utilBruta = s.sociedadFiltroMes === 'Todos' ? socio.utilidadCausada : utilidadPeriodo * (socio.porcentaje / 100);
                                let liquido = utilBruta;
                                if (socio.saldoMantenimiento < 0 && s.sociedadFiltroMes === 'Todos') liquido = utilBruta - Math.abs(socio.saldoMantenimiento);
                                const roiSocio = ((utilBruta / socio.inversion) * 100).toFixed(1);

                                return `
                                <tr class="border-b hover:bg-slate-50 transition-colors">
                                    <td class="p-3 flex items-center whitespace-nowrap"><div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center font-bold mr-3">${socio.nombre.charAt(0)}</div><span class="font-bold">${socio.nombre}</span></td>
                                    <td class="p-3 text-center font-black text-indigo-600 bg-indigo-50/30">${roiSocio}%</td>
                                    <td class="p-3 text-right text-sm font-medium text-slate-600">${formatCOP(socio.inversion)}</td>

                    </table>
                </div>
            </div>
        </div>`;
    },

    renderNIIFCharts: () => {
        const s = App.state;
        const t = App.getTotales();

        // Limpiar gráfico anterior si existe
        if(window.niifDynamicChartObj) window.niifDynamicChartObj.destroy();
        
        const ctx = document.getElementById('niifDynamicChart');
        if(!ctx) return;

        let chartConfig = { type: 'bar', data: {}, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } } };

        if(s.niifTab === 'informe-consolidado') {
            const pInfo = s.informePdfFiltro !== 'Todos' ? s.informePeriodos.filter(p => p.periodo === s.informePdfFiltro) : s.informePeriodos;
            chartConfig.type = 'bar';
            chartConfig.data = {
                labels: pInfo.map(p => p.periodo.substring(0, 8)),
                datasets: [
                    { label: 'Ingreso Real', data: pInfo.map(p => p.ingresoReal), backgroundColor: '#3b82f6', borderRadius: 4 },
                    { label: 'Utilidad Real', data: pInfo.map(p => p.utilReal), backgroundColor: '#10b981', borderRadius: 4 }
                ]
            };
        } else if(s.niifTab === 'estado-situacion') {
            chartConfig.type = 'doughnut';
            chartConfig.data = {
                labels: ['Activos', 'Pasivos', 'Patrimonio'],
                datasets: [{
                    data: [t.inversionTotal + t.utilidadNeta, 81900472, t.inversionTotal + (t.utilidadNeta - 81900472)],
                    backgroundColor: ['#3b82f6', '#ef4444', '#10b981'],
                    borderWidth: 0, cutout: '60%'
                }]
            };
        } else if (s.niifTab === 'resultados') {
            chartConfig.type = 'pie';
            chartConfig.data = {
                labels: ['Costos Ope.', 'Utilidad Neta'],
                datasets: [{
                    data: [t.gastoTotal, t.utilidadNeta],
                    backgroundColor: ['#f87171', '#34d399'],
                    borderWidth: 0
                }]
            };
        } else if (s.niifTab === 'flujo-efectivo') {
            chartConfig.type = 'line';
            chartConfig.data = {
                labels: ['Inicio', 'Operación', 'Financiación', 'Final'],
                datasets: [{
                    label: 'Flujo Caja',
                    data: [0, t.ingresoRecaudado - t.gastoTotal, (t.ingresoRecaudado - t.gastoTotal) + (t.inversionTotal - 81900472), (t.ingresoRecaudado - t.gastoTotal) + (t.inversionTotal - 81900472)],
                    borderColor: '#6366f1', backgroundColor: 'rgba(99, 102, 241, 0.2)', fill: true, tension: 0.3
                }]
            };
        } else if (s.niifTab === 'patrimonio') {
            chartConfig.type = 'bar';
            chartConfig.data = {
                labels: ['Inicial', 'Utilidades (+)', 'Mantenimiento (-)', 'Final'],
                datasets: [{
                    label: 'Movimientos Patrimoniales',
                    data: [t.inversionTotal, t.utilidadNeta, -81900472, t.inversionTotal + (t.utilidadNeta - 81900472)],
                    backgroundColor: ['#cbd5e1', '#34d399', '#f87171', '#1e293b'],
                    borderRadius: 4
                }]
            };
        }

        window.niifDynamicChartObj = new Chart(ctx, chartConfig);
    },

    // Orquestador de Renderizado
    render: () => {
        const root = document.getElementById('app-root');
        
        let mainContent = '';
        switch(App.state.activeTab) {
            case 'dashboard': mainContent = App.renderDashboard(); break;
            case 'viajes': mainContent = App.renderViajes(); break;
            case 'cartera': mainContent = App.renderCartera(); break;
            case 'documentos': mainContent = App.renderDocumentos(); break;
            case 'nomina': mainContent = App.renderNomina(); break;
            case 'clientes': mainContent = App.renderClientes(); break;
            case 'finanzas': mainContent = App.renderNIIF(); break;
            case 'sociedad': mainContent = App.renderSociedad(); break;
        }

        // Estructura Base Global
        root.innerHTML = `
            ${App.renderModals()}
            
            <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center z-10 shrink-0 print:hidden shadow-sm sticky top-0">
                <div class="flex items-center">
                    ${App.state.activeTab !== 'dashboard' ? `<button onclick="App.setTab('dashboard')" class="mr-3 sm:mr-4 bg-slate-100 p-2 rounded-full text-slate-600 hover:bg-slate-200 transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>` : ''}
                    <h1 onclick="App.setTab('dashboard')" class="text-lg sm:text-xl font-black text-slate-800 flex items-center tracking-tight cursor-pointer hover:text-blue-600 transition-colors"><i data-lucide="anchor" class="mr-2 text-blue-600 w-5 h-5 sm:w-6 sm:h-6"></i> Don Sebe</h1>
                </div>
                <div class="bg-slate-900 text-white px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold shadow-md flex items-center"><div class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></div> Admin</div>
            </header>
            
            <main class="flex-1 overflow-y-auto p-4 md:p-6 pb-8 bg-slate-50 print:bg-white print:p-0 print:overflow-visible">
                <div class="max-w-6xl mx-auto">${mainContent}</div>
            </main>
        `;

        lucide.createIcons();

        // Inyectar Chart NIIF si corresponde
        if(App.state.activeTab === 'finanzas') App.renderNIIFCharts();

        // Renderizado gráfico Avanzado en Dashboard
        if(App.state.activeTab === 'dashboard') {
            const ctx = document.getElementById('mainDashChart');
            if(ctx) {
                const s = App.state;
                const labels = s.informePeriodos.map(p => p.periodo.split(' ')[0]); 
                const ingresosBrutos = s.informePeriodos.map(p => p.ingresoProy); 
                const utilidadesBrutas = s.informePeriodos.map(p => p.utilProy);
                const utilidadesNetas = s.informePeriodos.map(p => p.utilReal); 

                if(window.dashChart) window.dashChart.destroy();
                window.dashChart = new Chart(ctx, {
                    type: 'line',
                    data: { 
                        labels: labels, 
                        datasets: [
                            { label: 'Ingresos', data: ingresosBrutos, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4, borderWidth: 3, fill: true, pointRadius: 3 }, 
                            { label: 'Util. Bruta', data: utilidadesBrutas, borderColor: '#10b981', backgroundColor: 'transparent', tension: 0.4, borderWidth: 2, pointRadius: 2 },
                            { label: 'Util. Neta', data: utilidadesNetas, borderColor: '#0f766e', backgroundColor: 'rgba(15, 118, 110, 0.1)', tension: 0.4, borderWidth: 3, fill: true, pointRadius: 3 }
                        ]
                    },
                    options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 6, font: { weight: 'bold', size: 10 } } } }, scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { weight: 'bold', size: 10 }, color: '#94a3b8', callback: function(value) { return '$' + (value / 1000000) + 'M'; } } }, x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 10 }, color: '#64748b' } } } }
                });
            }
        }
    }
};

window.onload = () => { App.render(); };

</script>
</body>
</html>
