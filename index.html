<body class="flex flex-col h-screen bg-slate-50 font-sans overflow-hidden text-slate-800">

    <div id="app-root" class="flex flex-col h-full w-full relative"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, initializeFirestore, persistentLocalCache, collection, doc, setDoc, getDoc, deleteDoc, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

/**
 * ==========================================
 * 1. CONFIGURACIÓN FIREBASE (DINÁMICA DE ENTORNO)
 * ==========================================
 */
const fallbackConfig = {
    apiKey: "AIzaSyBLbvNxeF7SqjZ4tRSDH0O2BvIVrIuG764",
    authDomain: "nexus-jr.firebaseapp.com",
    projectId: "nexus-jr",
    storageBucket: "nexus-jr.firebasestorage.app",
    messagingSenderId: "273022472068",
    appId: "1:273022472068:web:74cf3c09e664d2a9f2d7d1"
};

let auth = null;
let db = null;
window.isFirebaseReady = false;
let currentUser = null;
window.activeFirebaseListeners = [];
window.hasLoadedFromCloud = {};

const appIdStr = typeof __app_id !== 'undefined' ? __app_id : "don-sebe-erp";

// Inicialización Segura Dinámica con Motor Offline Nativo (IndexedDB)
let firebaseConfig = fallbackConfig;
try {
    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        firebaseConfig = JSON.parse(__firebase_config);
    }
} catch (e) {
    console.warn("JSON Parse Fallback para Configuración:", e);
}

try {
    const app = initializeApp(firebaseConfig);
    auth = getAuth(app);
    
    try {
        db = initializeFirestore(app, { localCache: persistentLocalCache() });
        console.log("📦 Motor Offline de Firebase activado (IndexedDB).");
    } catch (e) {
        db = getFirestore(app); 
    }
    
    window.isFirebaseReady = true;
} catch (error) {
    console.error("🔥 Error inicializando Firebase. Cargando en Modo Local Estricto:", error);
}

/**
 * ==========================================
 * 2. MOTOR HÍBRIDO DE DATOS (OFFLINE FIRST)
 * ==========================================
 */
window.dbHelper = {
    save: async (colName, id, data) => {
        const idx = App.state[colName].findIndex(x => x.id === id);
        if(idx !== -1) App.state[colName][idx] = { ...App.state[colName][idx], ...data };
        else App.state[colName].push({ id, ...data });
        window.App.render();

        if (window.isFirebaseReady && currentUser) {
            setDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', colName, id.toString()), data, { merge: true })
                .catch(e => console.warn("Guardado encolado para próxima conexión...", e));
        }
    },
    saveBatch: async (operations) => {
        operations.forEach(op => {
            const idx = App.state[op.colName].findIndex(x => x.id === op.id);
            if(idx !== -1) App.state[op.colName][idx] = { ...App.state[op.colName][idx], ...op.data };
            else App.state[op.colName].push({ id: op.id, ...op.data });
        });
        window.App.render();

        if (window.isFirebaseReady && currentUser) {
            const batch = writeBatch(db);
            operations.forEach(op => {
                const ref = doc(db, 'artifacts', appIdStr, 'public', 'data', op.colName, op.id.toString());
                batch.set(ref, op.data, { merge: true });
            });
            batch.commit().catch(e => console.warn("Lote de operaciones encolado offline...", e));
        }
    },
    remove: async (colName, id) => {
        App.state[colName] = App.state[colName].filter(x => x.id !== id);
        window.App.render();
        
        if (window.isFirebaseReady && currentUser) {
            deleteDoc(doc(db, 'artifacts', appIdStr, 'public', 'data', colName, id.toString()))
                .catch(e => console.warn("Borrado encolado para próxima conexión...", e));
        }
    }
};

const copFormatter = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0, maximumFractionDigits: 0 });
window.formatCOP = (value) => copFormatter.format(value || 0);
window.parseCOP = (valueStr) => Number(valueStr.replace(/[^0-9.-]+/g,""));

/**
 * ==========================================
 * 3. STATE MANAGEMENT Y ARQUITECTURA
 * ==========================================
 */
const App = {
    state: {
        activeTab: 'dashboard', niifTab: 'estado-situacion', docTab: 'escaner',
        uploadSuccess: false, isFabOpen: false, isSyncingData: false,
        carteraViajeFiltro: 'Todos', dbFiltroPeriodo: 'Todos', dbFiltroRuta: 'Todos',
        alertMsg: null, // PARCHE: Estado para alertas customizadas
        
        backupConfig: JSON.parse(localStorage.getItem('donsebe_backup_config')) || { auto: false, time: '18:00', last: '' },
        
        selectedViaje: null, selectedCliente: null, selectedSocio: null,
        isAddViajeOpen: false, isAddClienteOpen: false, isAddNominaOpen: false, isAddSocioOpen: false, isTransferOpen: false, isAddCuentaOpen: false, isAddTransaccionOpen: false,
        editingViajeId: null, editingClienteId: null, editingSocioId: null, editingCuentaId: null,

        numpad: { isOpen: false, targetField: null, targetLabel: '', targetForm: 'viaje', value: '0' },

        formTemp: {
            viaje: { modalidad: 'unico', subClientes: [{ cliente: '', flete: '', abono: '' }], fecha: '', ruta: '', observaciones: '', productos: '', clientesAsociados: '', ingreso: 0, gastos: 0, cartera: 0, pagoFlete: 0, pagoCargue: 0, cuentaIngresoId: '', cuentaEgresoId: '' },
            pagoCartera: { idCarteraViaje: null, cliente: '', viaje: '', valorDeuda: 0, montoPagar: 0, cuentaId: '', fecha: '' },
            cliente: { nombre: '', nit: '', segmento: 'Persona Común', tipo: 'General', telefono: '', ubicacion: '' },
            nomina: { fecha: '', viaje: '', productosAsociados: '', clientesAsociados: '', cuentaId: '' },
            nominaCrew: [],
            socio: { nombre: '', porcentaje: 0, inversion: 0, saldoMantenimiento: 0, cuentaId: '' },
            transferencia: { vendedorId: '', compradorId: '', porcentaje: 0 },
            cuenta: { nombre: '', tipo: 'banco', saldoInicial: 0, numero: '' },
            transaccion: { tipo: 'ingreso', monto: 0, fecha: new Date().toISOString().split('T')[0], concepto: '', cuentaId: '', cuentaDestinoId: '' }
        },

        config: {
            pdfIncludes: { balance: true, resultados: true, flujo: true, patrimonio: true, socios: true },
            ui: { isDark: false, bgColor: '#f8fafc', textColor: '#1e293b', textSize: 'normal' }
        },

        cuentas: [], transacciones: [], viajes: [], carteraViajes: [], carteraClientes: [], clientesDir: [], socios: [], pagosNomina: [],
        
        nominaBase: [
            { id: 1, cargo: 'Capitán', valorDia: 190000, diasDefault: 5 }, { id: 2, cargo: 'Marinero 1', valorDia: 80000, diasDefault: 5 },
            { id: 3, cargo: 'Marinero 2', valorDia: 80000, diasDefault: 5 }, { id: 4, cargo: 'Marinero 3', valorDia: 80000, diasDefault: 5 },
            { id: 5, cargo: 'Cocinero', valorDia: 80000, diasDefault: 5 }, { id: 6, cargo: 'Maquinista 1', valorDia: 120000, diasDefault: 5 },
            { id: 7, cargo: 'Maquinista 2', valorDia: 100000, diasDefault: 5 }
        ]
    },

    navItems: [
        { id: 'dashboard', label: 'Inicio', icon: 'trending-up' },
        { id: 'tesoreria', label: 'Cajas/Bancos', icon: 'wallet-cards' },
        { id: 'viajes', label: 'Viajes', icon: 'ship' },
        { id: 'finanzas', label: 'NIIF', icon: 'landmark' },
        { id: 'cartera', label: 'Cartera', icon: 'wallet' },
        { id: 'nomina', label: 'Nómina', icon: 'users' },
        { id: 'sociedad', label: 'Sociedad', icon: 'anchor' },
        { id: 'clientes', label: 'Clientes', icon: 'contact' },
        { id: 'documentos', label: 'Archivos', icon: 'file-scan' },
        { id: 'basedatos', label: 'BD Ingresos', icon: 'database' },
        { id: 'config', label: 'Ajustes', icon: 'settings' }
    ],

    // MÓDULO DE ALERTAS CUSTOMIZADAS (Remplaza a los 'alert' nativos prohibidos)
    showAlert: (msg) => { App.state.alertMsg = msg; App.render(); },
    closeAlert: () => { App.state.alertMsg = null; App.render(); },

    // CORE: GESTIÓN DE RESPALDOS Y CRON AUTOMÁTICO
    setBackupConfig: (field, value) => {
        App.state.backupConfig[field] = value;
        localStorage.setItem('donsebe_backup_config', JSON.stringify(App.state.backupConfig));
        App.render();
    },
    exportFullBackup: () => {
        const s = App.state;
        const data = { cuentas: s.cuentas, transacciones: s.transacciones, viajes: s.viajes, carteraViajes: s.carteraViajes, carteraClientes: s.carteraClientes, clientesDir: s.clientesDir, socios: s.socios, pagosNomina: s.pagosNomina, timestamp: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url; link.download = `DonSebe_FullBackup_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        
        App.state.backupConfig.last = new Date().toISOString().split('T')[0];
        localStorage.setItem('donsebe_backup_config', JSON.stringify(App.state.backupConfig));
        App.render();
    },
    triggerFileInput: () => { document.getElementById('backup-file-input').click(); },
    importFullBackup: async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                const data = JSON.parse(event.target.result);
                if (!data.viajes || !data.cuentas) throw new Error("Estructura de Backup Inválida");
                
                App.showAlert("⏳ Inicializando restauración desde copia de seguridad. Por favor, no cierres la aplicación.");
                
                const cols = ['cuentas', 'transacciones', 'viajes', 'carteraViajes', 'carteraClientes', 'clientesDir', 'socios', 'pagosNomina'];
                const batchOps = [];
                
                cols.forEach(col => {
                    if (data[col]) { data[col].forEach(item => { batchOps.push({ colName: col, id: item.id, data: item }); }); }
                });
                
                await window.dbHelper.saveBatch(batchOps);
                App.showAlert("✅ Restauración y Carga Manual completada con éxito. Toda la base de datos se ha sincronizado.");
            } catch (err) {
                console.error(err);
                App.showAlert("❌ Error al leer el archivo. Asegúrate de que subiste un archivo .json válido de Don Sebe.");
            }
            e.target.value = '';
        };
        reader.readAsText(file);
    },
    checkAutoBackup: () => {
        const config = App.state.backupConfig;
        if (!config.auto) return;
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        const localTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
        
        if (localTime === config.time && config.last !== today) {
            console.log("⏱️ Ejecutando Auto-Backup programado (Cron Job Local)...");
            App.exportFullBackup();
        }
    },

    setTab: (tab) => { App.state.activeTab = tab; App.state.isFabOpen = false; App.render(); },
    setNiifTab: (tab) => { App.state.niifTab = tab; App.render(); },
    setDocTab: (tab) => { App.state.docTab = tab; App.render(); },
    setFilterVal: (key, val) => { App.state[key] = val; App.render(); },
    togglePdfConfig: (key) => { App.state.config.pdfIncludes[key] = !App.state.config.pdfIncludes[key]; App.render(); },
    
    setUIConfig: (key, val) => { App.state.config.ui[key] = val; App.applyTheme(); App.render(); },
    applyTheme: () => {
        const ui = App.state.config.ui; const root = document.documentElement;
        if(ui.textSize === 'small') root.style.fontSize = '14px'; else if(ui.textSize === 'large') root.style.fontSize = '18px'; else root.style.fontSize = '16px';
        let styleTag = document.getElementById('dynamic-theme');
        if(!styleTag) { styleTag = document.createElement('style'); styleTag.id = 'dynamic-theme'; document.head.appendChild(styleTag); }
        if(ui.isDark) {
            styleTag.innerHTML = `body, main, .bg-slate-50 { background-color: #0f172a !important; color: #f8fafc !important; } .bg-white { background-color: #1e293b !important; border-color: #334155 !important; } .text-slate-800, .text-slate-900 { color: #f8fafc !important; } .text-slate-700, .text-slate-600 { color: #cbd5e1 !important; } .text-slate-500, .text-slate-400 { color: #94a3b8 !important; } .border-slate-100, .border-slate-200, .border-slate-300 { border-color: #334155 !important; } header, select, input, textarea { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; } table th { background-color: #0f172a !important; color: #f8fafc !important; } .bg-blue-50, .bg-red-50, .bg-green-50, .bg-orange-50, .bg-indigo-50 { background-color: #1e293b !important; border-color: #334155 !important; } .modal-box { background-color: #1e293b !important; color: #f8fafc !important; } @media print { * { color: black !important; background: white !important; } }`;
        } else {
            styleTag.innerHTML = `body, main { background-color: ${ui.bgColor} !important; color: ${ui.textColor} !important; }`;
        }
    },
    exportToExcel: () => {
        const viajes = App.state.viajes; if(!viajes.length) { App.showAlert("No hay datos para exportar."); return; }
        const headers = ['ID', 'Fecha', 'Viaje/Documento', 'Periodo', 'Ruta', 'Ingreso Bruto', 'Gastos Operativos', 'Utilidad Bruta', 'Cartera Acumulada', 'Ingreso Recaudado (Caja)', 'Clientes', 'Productos', 'Pago Flete', 'Pago Cargue', 'Observaciones'];
        const rows = viajes.map(v => [ v.id, v.fecha, `"${v.viaje}"`, `"${v.periodo || ''}"`, `"${v.ruta}"`, v.ingreso, v.gastos, v.utilidadBruta, v.cartera, v.ingresoRecaudado, `"${v.clientesAsociados || ''}"`, `"${v.productos || ''}"`, v.pagoFlete || 0, v.pagoCargue || 0, `"${v.observaciones || ''}"` ]);
        let csvContent = "\uFEFF" + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob);
        const link = document.createElement("a"); link.setAttribute("href", url); link.setAttribute("download", `DonSebe_Backup_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    },
    
    openNumpad: (targetField, label, formTarget = 'viaje') => { 
        const formEl = document.querySelector('form');
        if (formEl && App.state.formTemp[formTarget]) {
            Array.from(formEl.elements).forEach(el => {
                if (el.name && el.value !== undefined) {
                    App.state.formTemp[formTarget][el.name] = el.value;
                }
            });
        }
        
        App.state.numpad.isOpen = true; 
        App.state.numpad.targetField = targetField; 
        App.state.numpad.targetLabel = label; 
        App.state.numpad.targetForm = formTarget; 
        App.state.numpad.value = App.state.formTemp[formTarget][targetField] ? App.state.formTemp[formTarget][targetField].toString() : '0'; 
        App.render(); 
    },
    setViajeModalidad: (mod) => {
        App.state.formTemp.viaje.modalidad = mod;
        if (mod === 'multiple' && App.state.formTemp.viaje.subClientes.length === 0) {
            App.state.formTemp.viaje.subClientes.push({ cliente: '', flete: '', abono: '' });
        }
        App.render();
    },
    addSubCliente: () => {
        App.state.formTemp.viaje.subClientes.push({ cliente: '', flete: '', abono: '' });
        App.render();
    },
    removeSubCliente: (idx) => {
        App.state.formTemp.viaje.subClientes.splice(idx, 1);
        App.calcViajeMulti();
    },
    updateSubCliente: (idx, field, val) => {
        App.state.formTemp.viaje.subClientes[idx][field] = val;
        if(field === 'flete' || field === 'abono') App.calcViajeMulti();
    },
    calcViajeMulti: () => {
        const v = App.state.formTemp.viaje;
        let ing = 0, cart = 0;
        let cls = [];
        v.subClientes.forEach(sc => {
            const f = Number(sc.flete)||0;
            const a = Number(sc.abono)||0;
            ing += f;
            const deuda = f - a;
            if (deuda > 0) cart += deuda;
            if(sc.cliente && sc.cliente.trim() !== '') cls.push(sc.cliente.trim());
        });
        v.ingreso = ing;
        v.cartera = cart;
        v.clientesAsociados = [...new Set(cls)].join(', ');
        App.render();
    },
    openPagoCartera: (idCarteraViaje) => {
        const cv = App.state.carteraViajes.find(x => x.id === idCarteraViaje);
        if(!cv) return;
        App.state.formTemp.pagoCartera = { idCarteraViaje: cv.id, cliente: cv.cliente, viaje: cv.viaje, valorDeuda: cv.valor, montoPagar: cv.valor, cuentaId: '', fecha: new Date().toISOString().split('T')[0] };
        App.state.isPagoCarteraOpen = true;
        App.render();
    },
    submitPagoCartera: async (e) => {
        e.preventDefault();
        const f = App.state.formTemp.pagoCartera;
        const cta = parseInt(e.target.cuentaId.value);
        const monto = Number(e.target.montoPagar.value);
        if(monto <= 0 || monto > f.valorDeuda || !cta) { App.showAlert("Valor inválido o excede la deuda actual."); return; }

        const cv = App.state.carteraViajes.find(x => x.id === f.idCarteraViaje);
        const cc = App.state.carteraClientes.find(x => x.cliente === cv.cliente);

        const newId = Date.now();
        const batchOps = [];

        batchOps.push({ colName: 'transacciones', id: newId, data: { id: newId, cuentaId: cta, tipo: 'ingreso', monto: monto, fecha: e.target.fecha.value, concepto: `Abono Cartera - ${cv.cliente} (${cv.viaje})`, modulo: 'Cartera', referencia: cv.idViaje } });

        const nuevoValorViaje = cv.valor - monto;
        batchOps.push({ colName: 'carteraViajes', id: cv.id, data: { ...cv, valor: nuevoValorViaje } });

        if (cc) {
            const nuevoTotal = cc.valorTotal - monto;
            batchOps.push({ colName: 'carteraClientes', id: cc.id, data: { ...cc, valorTotal: nuevoTotal, estado: nuevoTotal <= 0 ? 'Pagado' : 'Pendiente' } });
        }

        await window.dbHelper.saveBatch(batchOps);
        App.state.isPagoCarteraOpen = false;
        App.showAlert(`Pago registrado con éxito por ${window.formatCOP(monto)}.`);
        App.render();
    },
    handleNumpadClick: (key) => {
        let val = App.state.numpad.value;
        if(key === 'DEL') val = val.length > 1 ? val.slice(0, -1) : '0'; else if(key === 'CLEAR') val = '0'; 
        else { if(val.length > 12) return; if (val === '0') val = key === '000' ? '0' : key; else val += key; }
        App.state.numpad.value = val; App.state.formTemp[App.state.numpad.targetForm][App.state.numpad.targetField] = parseInt(val, 10); 
        
        // ACTUALIZACIÓN PARCIAL: Solo modificar el texto en el DOM evita que toda la pantalla parpadee.
        const displayEl = document.getElementById('numpad-display');
        if (displayEl) displayEl.innerText = formatCOP(parseInt(val, 10));
        else App.render();
    },
    closeNumpad: () => { App.state.numpad.isOpen = false; App.render(); },

    // CORE TESORERÍA Y FINANZAS
    getSaldoCuenta: (cuentaId) => {
        const s = App.state; const cuenta = s.cuentas.find(c => c.id === cuentaId); if(!cuenta) return 0;
        let saldo = cuenta.saldoInicial || 0;
        s.transacciones.filter(t => t.cuentaId === cuentaId).forEach(t => { if(t.tipo === 'ingreso') saldo += t.monto; if(t.tipo === 'egreso') saldo -= t.monto; });

    getInformePeriodos: () => {
        const s = App.state;
        const periodosMap = {};
        s.viajes.forEach(v => {
            const per = v.periodo || 'General';
            if (!periodosMap[per]) {
                periodosMap[per] = { periodo: per, ingresoProy: 0, ingresoReal: 0, utilProy: 0, utilReal: 0, cartera: 0, gastos: 0, _date: new Date(v.fecha || '2000-01-01') };
            }
            periodosMap[per].ingresoProy += Number(v.ingreso) || 0;
            periodosMap[per].ingresoReal += Number(v.ingresoRecaudado) || 0;
            periodosMap[per].gastos += Number(v.gastos) || 0;
            periodosMap[per].utilProy += Number(v.utilidadBruta) || 0;
            periodosMap[per].cartera += Number(v.cartera) || 0;
            periodosMap[per].utilReal += (Number(v.ingresoRecaudado) || 0) - (Number(v.gastos) || 0);
            
            if (v.fecha && new Date(v.fecha) > periodosMap[per]._date) periodosMap[per]._date = new Date(v.fecha);
        });
        
        const arr = Object.values(periodosMap).sort((a, b) => a._date - b._date);
        return arr.length > 0 ? arr : [{ periodo: 'Sin Movimientos', ingresoProy: 0, utilProy: 0, utilReal: 0, gastos: 0 }];
    },

    getTotales: () => {
        const s = App.state;
        const ingresoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.ingreso || 0), 0);
        const gastoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.gastos || 0), 0);
        const utilidadBruta = s.viajes.reduce((acc, curr) => acc + Number(curr.utilidadBruta || 0), 0);
        const carteraTotal = s.carteraClientes.filter(c => c.estado === 'Pendiente').reduce((acc, curr) => acc + Number(curr.valorTotal), 0); 
        const utilidadNeta = ingresoTotal - gastoTotal; 
        const ingresoRecaudado = ingresoTotal - carteraTotal;
        const inversionTotal = s.socios.reduce((acc, curr) => acc + Number(curr.inversion || 0), 0);
        const deudaMantenimientoTotal = s.socios.filter(x => x.saldoMantenimiento < 0).reduce((acc, curr) => acc + Math.abs(curr.saldoMantenimiento || 0), 0);
        return { ingresoTotal, gastoTotal, utilidadBruta, carteraTotal, utilidadNeta, ingresoRecaudado, inversionTotal, deudaMantenimientoTotal };
    },

        const concentracionMora = t.carteraTotal > 0 ? ((topDeudorMonto / t.carteraTotal) * 100).toFixed(1) : 0;

        return `

            periodosInfo = todosLosPeriodos.filter(p => p.periodo === s.informePdfFiltro);
        }
        
        const totIngProy = periodosInfo.reduce((a,c)=>a+c.ingresoProy,0);
        const totIngReal = periodosInfo.reduce((a,c)=>a+c.ingresoReal,0);
        const totUtilProy = periodosInfo.reduce((a,c)=>a+c.utilProy,0);
        const totUtilReal = periodosInfo.reduce((a,c)=>a+c.utilReal,0);
        const totCartera = periodosInfo.reduce((a,c)=>a+c.cartera,0);

        const margenN = t.ingresoTotal > 0 ? ((t.utilidadNeta / t.ingresoTotal) * 100).toFixed(1) : 0;
        const roiG = t.inversionTotal > 0 ? ((t.utilidadNeta / t.inversionTotal) * 100).toFixed(1) : 0;

    await window.dbHelper.saveBatch(ops);
    if (!silent) App.showAlert("✅ Extracción exhaustiva de Datos de Excel completada.\nSe han sincronizado en Firestore:\n- Socios e Inversiones Reales\n- 6 Viajes (Octubre a Enero)\n- Cartera Detallada (Jhon Jairo, Oscar, Alex...)\n- Transacciones de Efectivo Barcos y Pagos de Utilidades.");
    App.render();
};

window.onload = () => {
    window.App.applyTheme();
    window.App.render();
    
    window.addEventListener('online', () => window.App.render());
    window.addEventListener('offline', () => window.App.render());

    // Motor Cron para Evaluar la Copia de Seguridad Local cada 30 segundos
    setInterval(() => {
        if(window.App && window.App.checkAutoBackup) window.App.checkAutoBackup();
    }, 30000);

    if (window.isFirebaseReady) {
        
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Error Auth Firebase:", err);
            }
        };

        initAuth().then(() => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    
                    const sysRef = doc(db, 'artifacts', appIdStr, 'public', 'data', '_system', 'metadata');
                    try {
                        const sysSnap = await getDoc(sysRef);
                        if (!sysSnap.exists()) {
                            console.log("🚀 Base de datos inicial en blanco. Inyectando configuración por defecto automáticamente...");
                            await window.runInitialMigration(true);
                            await setDoc(sysRef, { initialized: true, createdAt: new Date().toISOString() });
                        }
                    } catch (e) {
                        console.warn("Validación de primer inicio omitida por modo Offline total.");
                    }

                    window.activeFirebaseListeners.forEach(unsub => unsub()); 
                    window.activeFirebaseListeners = [];

                    const colecciones = ['cuentas', 'transacciones', 'viajes', 'clientesDir', 'socios', 'pagosNomina', 'carteraViajes', 'carteraClientes'];
                    
                    colecciones.forEach(col => {
                        const colRef = collection(db, 'artifacts', appIdStr, 'public', 'data', col);
                        const unsub = onSnapshot(colRef, (snapshot) => {
                            const data = snapshot.docs.map(d => d.data());
                            
                            if (data.length > 0) { 
                                window.App.state[col] = data; 
                                window.hasLoadedFromCloud[col] = true;
                            } else if (window.hasLoadedFromCloud[col]) {
                                window.App.state[col] = []; 
                            }
                            
                            window.App.render(); 
                        }, (error) => {
                            console.error(`Error recibiendo datos de ${col}:`, error);
                        });
                        
                        window.activeFirebaseListeners.push(unsub);
                    });
                }
            });
        });
    }
};

</script>
