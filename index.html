    <style>
        /* Animaciones base y utilidades nativas */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        .animate-slide-up { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-scale-in { animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        
        /* Ocultar scrollbars manteniendo funcionalidad */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Desplazamiento suave para tablas en móviles */
        .table-scroll { -webkit-overflow-scrolling: touch; }

        /* Estilos de Impresión para PDF */
        @media print {
            body { background: white !important; font-size: 11px !important; }
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            .shadow-sm, .shadow-md, .shadow-lg, .shadow-2xl { box-shadow: none !important; }
            .border { border: 1px solid #e2e8f0 !important; }
            #app-root { height: auto !important; overflow: visible !important; }
            main { padding: 0 !important; overflow: visible !important; }
            .print-page-break { page-break-before: always; margin-top: 20px; padding-top: 20px; border-top: 1px solid #ccc; }
            
            /* Ajuste estricto de tablas para no desbordar el margen de la hoja */
            .table-scroll { overflow: visible !important; }
            table { width: 100% !important; table-layout: fixed !important; border-collapse: collapse !important; }
            th, td { white-space: normal !important; word-wrap: break-word !important; padding: 4px !important; font-size: 9px !important; }
            .min-w-[400px], .min-w-[650px], .min-w-[700px], .min-w-[900px], .min-w-[1200px] { min-width: 0 !important; width: 100% !important; }
        }
    </style>
</head>

    navItems: [

    ],

    // Métodos de Mutación (Acciones)
    setTab: (tab) => { App.state.activeTab = tab; App.render(); },
    setNiifTab: (tab) => { App.state.niifTab = tab; App.render(); },
    setDocTab: (tab) => { App.state.docTab = tab; App.render(); },
    setFilterVal: (key, val) => { App.state[key] = val; App.render(); },
    togglePdfConfig: (key) => { App.state.config.pdfIncludes[key] = !App.state.config.pdfIncludes[key]; App.render(); },
    
    // Funciones del Numpad Nativo (Corregido)
    openNumpad: (targetField, label) => {
        App.state.numpad.isOpen = true;
        App.state.numpad.targetField = targetField;
        App.state.numpad.targetLabel = label;
        App.state.numpad.value = App.state.formTemp.viaje[targetField] ? App.state.formTemp.viaje[targetField].toString() : '0';
        App.render();
    },
    handleNumpadClick: (key) => {
        let val = App.state.numpad.value;
        if(key === 'DEL') { 
            val = val.length > 1 ? val.slice(0, -1) : '0'; 
        } else if(key === 'CLEAR') { 
            val = '0'; 
        } else {
            // Evitar desbordamiento
            if(val.length > 12) return;
            // Manejo correcto de ceros a la izquierda
            if (val === '0') {
                val = key === '000' ? '0' : key;
            } else {
                val += key;
            }
        }
        
        App.state.numpad.value = val;
        App.state.formTemp.viaje[App.state.numpad.targetField] = parseInt(val, 10);
        App.render();
    },
    closeNumpad: () => {
        App.state.numpad.isOpen = false;
        App.render();
    },

    // CRUD VIAJES
    openModalViaje: (id) => { App.state.selectedViaje = App.state.viajes.find(v => v.id === id); App.render(); },
    editViaje: (id) => {
        const v = App.state.viajes.find(v => v.id === id);
        if(!v) return;
        App.state.editingViajeId = id;
        App.state.formTemp.viaje = { ...v };
        App.state.selectedViaje = null;
        App.state.isAddViajeOpen = true;
        App.render();
    },
    deleteViaje: (id, btnElement) => {
        if(btnElement.innerText === 'Eliminar Viaje') {
            btnElement.innerText = 'Confirmar Borrado';
            btnElement.classList.replace('bg-slate-100', 'bg-red-600');
            btnElement.classList.replace('text-red-600', 'text-white');
        } else {
            App.state.viajes = App.state.viajes.filter(v => v.id !== id);
            App.closeModals();
        }
    },
    submitViaje: (e) => {
        e.preventDefault(); const f = e.target;
        const formD = App.state.formTemp.viaje;
        
        const viajeData = {
            fecha: f.fecha.value, ruta: f.ruta.value, 
            ingreso: formD.ingreso, gastos: formD.gastos, cartera: formD.cartera, 
            pagoFlete: formD.pagoFlete, pagoCargue: formD.pagoCargue,
            productos: f.productos.value, clientesAsociados: f.clientesAsociados.value,
            observaciones: f.observaciones.value,
            utilidadBruta: formD.ingreso - formD.gastos,
            ingresoRecaudado: formD.ingreso - formD.cartera
        };

        if(App.state.editingViajeId) {
            // Actualizar
            const idx = App.state.viajes.findIndex(v => v.id === App.state.editingViajeId);
            if(idx !== -1) {
                App.state.viajes[idx] = { ...App.state.viajes[idx], ...viajeData };
            }
        } else {
            // Crear
            App.state.viajes.push({
                id: App.state.viajes.length + 1, viaje: `Viaje #${App.state.viajes.length + 1}`, periodo: 'Nuevo Periodo',
                ...viajeData
            });
        }
        App.closeModals();
    },

    // CRUD CLIENTES
    openModalCliente: (clienteNombre) => { App.state.selectedCliente = App.state.clientesDir.find(c => c.nombre === clienteNombre); App.render(); },
    editCliente: (id) => {
        const c = App.state.clientesDir.find(c => c.id === id);
        if(!c) return;
        App.state.editingClienteId = id;
        App.state.formTemp.cliente = { ...c };
        App.state.selectedCliente = null;
        App.state.isAddClienteOpen = true;
        App.render();
    },
    deleteCliente: (id, btnElement) => {
        if(btnElement.innerText === 'Eliminar') {
            btnElement.innerText = 'Confirmar Borrado';
            btnElement.classList.replace('bg-slate-100', 'bg-red-600');
            btnElement.classList.replace('text-red-600', 'text-white');
        } else {
            App.state.clientesDir = App.state.clientesDir.filter(c => c.id !== id);
            App.closeModals();
        }
    },
    submitCliente: (e) => {
        e.preventDefault(); const f = e.target;
        
        const clientData = {
            nombre: f.nombre.value, tipo: f.tipo.value, segmento: f.segmento.value,
            nit: f.nit.value || 'N/A', telefono: f.telefono.value, ubicacion: f.ubicacion.value
        };

        if(App.state.editingClienteId) {
            const idx = App.state.clientesDir.findIndex(c => c.id === App.state.editingClienteId);
            if(idx !== -1) App.state.clientesDir[idx] = { ...App.state.clientesDir[idx], ...clientData };
        } else {
            App.state.clientesDir.push({ id: App.state.clientesDir.length + 1, ...clientData });
        }
        App.closeModals();
    },

    // CRUD NÓMINA
    openAddNomina: () => {
        App.state.formTemp.nomina = App.state.nominaBase.map(n => ({...n, activo: true, dias: n.diasDefault}));
        App.state.isAddNominaOpen = true;
        App.render();
    },
    toggleNominaCrew: (id) => {
        const c = App.state.formTemp.nomina.find(n => n.id === id);
        if(c) c.activo = !c.activo;
        App.render();
    },
    updateNominaDias: (id, dias) => {
        const c = App.state.formTemp.nomina.find(n => n.id === id);
        if(c) c.dias = Number(dias);
        App.render();
    },
    submitNomina: (e) => {
        e.preventDefault(); const f = e.target;
        const tripulacionActiva = App.state.formTemp.nomina.filter(n => n.activo);
        const totalPagado = tripulacionActiva.reduce((acc, curr) => acc + (curr.valorDia * curr.dias), 0);
        const faltantes = App.state.formTemp.nomina.filter(n => !n.activo).length;
        
        let detalleText = faltantes === 0 ? `Tripulación completa (${tripulacionActiva[0].dias} días)` : `${tripulacionActiva.length} tripulantes. Faltaron: ${faltantes}`;
        let extraInfo = `Prods: ${f.productosAsociados.value || 'N/A'} | Clientes: ${f.clientesAsociados.value || 'N/A'}`;

        App.state.pagosNomina.unshift({
            id: App.state.pagosNomina.length + 1, fecha: f.fecha.value, viaje: f.viaje.value, 
            valor: totalPagado, estado: 'Pagado', detalle: detalleText, extra: extraInfo
        });
        App.closeModals();
    },

    closeModals: () => { 
        App.state.selectedViaje = null; 
        App.state.selectedCliente = null; 
        App.state.isAddViajeOpen = false;
        App.state.isAddClienteOpen = false;
        App.state.isAddNominaOpen = false;
        App.state.numpad.isOpen = false;
        App.state.editingViajeId = null;
        App.state.editingClienteId = null;
        App.state.formTemp.viaje = { fecha: '', ruta: '', observaciones: '', productos: '', clientesAsociados: '', ingreso: 0, gastos: 0, cartera: 0, pagoFlete: 0, pagoCargue: 0 };
        App.state.formTemp.cliente = { nombre: '', nit: '', segmento: 'Persona Común', tipo: 'General', telefono: '', ubicacion: '' };
        App.render(); 
    },

    // Calculadoras
    getTotales: () => {
        const s = App.state;
        const ingresoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.ingreso), 0);
        const gastoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.gastos), 0);
        const utilidadBruta = s.viajes.reduce((acc, curr) => acc + Number(curr.utilidadBruta), 0);
        const carteraTotal = s.carteraClientes.filter(c => c.estado === 'Pendiente').reduce((acc, curr) => acc + Number(curr.valorTotal), 0);
        const utilidadNeta = ingresoTotal - gastoTotal; 
        const ingresoRecaudado = ingresoTotal - carteraTotal;
        const inversionTotal = s.socios.reduce((acc, curr) => acc + curr.inversion, 0);
        return { ingresoTotal, gastoTotal, utilidadBruta, carteraTotal, utilidadNeta, ingresoRecaudado, inversionTotal };
    },

    handleMockUpload: () => {
        App.state.isUploading = true;
        App.state.uploadSuccess = false;
        App.render();
        setTimeout(() => {
            App.state.isUploading = false;
            App.state.uploadSuccess = true;
            App.render();
        }, 2000);

        const c = App.state.config.pdfIncludes;
        return `

                    type: 'line',

                                ticks: { 
                                    font: { weight: 'bold', size: 10 },
                                    color: '#94a3b8',
                                    callback: function(value) { return '$' + (value / 1000000) + 'M'; } 
                                } 
                            },
                            x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 10 }, color: '#64748b' } }
                        } 
                    }
                });
            }
        }
    }
};

// Inicialización del Sistema
window.onload = () => {
    App.render();
};

</script>
</body>
</html>
