<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Don Sebe ERP - Sistema Operativo Completo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para NIIF/Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Animaciones base y utilidades nativas */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Ocultar scrollbars manteniendo funcionalidad */
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col h-screen bg-slate-50 font-sans overflow-hidden text-slate-800">

    <!-- Contenedor Dinámico Principal -->
    <div id="app-root" class="flex flex-col h-full w-full"></div>

<script>
/**
 * ==========================================
 * NÚCLEO DEL SISTEMA (STATE MANAGEMENT)
 * ==========================================
 */

const formatCOP = (value) => new Intl.NumberFormat('es-CO', {
    style: 'currency', currency: 'COP', minimumFractionDigits: 0, maximumFractionDigits: 0
}).format(value || 0);

const App = {
    state: {
        activeTab: 'dashboard',
        niifTab: 'estado-situacion',
        docTab: 'escaner',
        sociedadFiltroMes: 'Todos',
        carteraViajeFiltro: 'Todos',
        isUploading: false,
        uploadSuccess: false,

        selectedViaje: null,
        selectedCliente: null,
        isAddViajeOpen: false,
        isAddClienteOpen: false,
        isAddNominaOpen: false,

        // Datos (Mock BD)
        viajes: [
            { id: 1, fecha: '2025-10-25', viaje: 'Viaje #1', ruta: 'B/tura - Satinga', ingreso: 66956000, gastos: 29107000, cartera: 12411000, observaciones: 'Madera bajada Satinga (Oscar)' },
            { id: 2, fecha: '2025-11-09', viaje: 'Viaje #2', ruta: 'B/tura - Satinga', ingreso: 46440300, gastos: 18340300, cartera: 11084000, observaciones: 'Madera Oscar' },
            { id: 3, fecha: '2025-11-19', viaje: 'Viaje #3', ruta: 'B/tura - Charco', ingreso: 73131000, gastos: 26871000, cartera: 0, observaciones: 'Flete completo pagado' },
            { id: 4, fecha: '2025-12-02', viaje: 'Viaje #4', ruta: 'B/tura - Charco', ingreso: 80023500, gastos: 22800000, cartera: 32119500, observaciones: 'Tubos, Grava, Varillas Tola (Alex) y Proyecto Hospital' },
            { id: 5, fecha: '2025-12-23', viaje: 'Viaje #5', ruta: 'B/tura - Tumaco', ingreso: 34820000, gastos: 16000000, cartera: 0, observaciones: 'Viaje Tumaco sin cartera' }
        ],
        carteraViajes: [
            { id: 1, idViaje: 1, viaje: 'Viaje #1', cliente: 'Oscar', concepto: 'Madera bajada Satinga', valor: 12411000, fecha: '2025-10-25' },
            { id: 2, idViaje: 2, viaje: 'Viaje #2', cliente: 'Oscar', concepto: 'Madera bajada Satinga', valor: 11084000, fecha: '2025-11-09' },
            { id: 3, idViaje: 4, viaje: 'Viaje #4', cliente: 'Alex', concepto: 'Tubos / Grava La Tola', valor: 13000000, fecha: '2025-12-02' },
            { id: 4, idViaje: 4, viaje: 'Viaje #4', cliente: 'Konny Hospital', concepto: 'Proyecto Hospital', valor: 1000000, fecha: '2025-12-02' },
            { id: 5, idViaje: 4, viaje: 'Viaje #4', cliente: 'Alex', concepto: 'Varillas Tola', valor: 4900000, fecha: '2025-12-02' },
            { id: 6, idViaje: 4, viaje: 'Viaje #4', cliente: 'Oscar', concepto: 'Madera bajada', valor: 8209500, fecha: '2025-12-02' }
        ],
        clientesDir: [
            { id: 1, nombre: 'John Jairo Silva', tipo: 'Equipos e Insumos', telefono: '310 000 0000', ubicacion: 'Buenaventura' },
            { id: 2, nombre: 'Oscar', tipo: 'Comerciante de Madera', telefono: '312 000 0000', ubicacion: 'Satinga' },
            { id: 3, nombre: 'Alex', tipo: 'Materiales Construcción', telefono: '315 000 0000', ubicacion: 'La Tola' },
            { id: 4, nombre: 'Konny Hospital', tipo: 'Institucional / Salud', telefono: '318 000 0000', ubicacion: 'El Charco' },
            { id: 5, nombre: 'Modesto', tipo: 'Socio / Proveedor', telefono: '320 000 0000', ubicacion: 'Tumaco' }
        ],
        carteraClientes: [
            { id: 1, cliente: 'John Jairo Silva', conceptoGeneral: 'Equipos e insumos', valorTotal: 41300000, viajesAsociados: 'Histórico', estado: 'Pendiente' },
            { id: 2, cliente: 'Oscar', conceptoGeneral: 'Madera bajada (Satinga)', valorTotal: 31704500, viajesAsociados: 'Viaje #1, #2, #4', estado: 'Pendiente' },
            { id: 3, cliente: 'Alex', conceptoGeneral: 'Materiales construcción Tola', valorTotal: 31400000, viajesAsociados: 'Viaje #4 y otros', estado: 'Pendiente' },
            { id: 4, cliente: 'Konny Hospital', conceptoGeneral: 'Transporte Hospital', valorTotal: 1000000, viajesAsociados: 'Viaje #4', estado: 'Pendiente' }
        ],
        socios: [
            { nombre: 'PRI (Socio 40%)', porcentaje: 40.0, inversion: 447637320, saldoMantenimiento: -12211288 },
            { nombre: 'Enel-Luz', porcentaje: 39.0, inversion: 766593300, saldoMantenimiento: 0 },
            { nombre: 'Roel', porcentaje: 15.0, inversion: 277500000, saldoMantenimiento: 0 },
            { nombre: 'Ronel', porcentaje: 2.22, inversion: 40000000, saldoMantenimiento: 0 },
            { nombre: 'Roy', porcentaje: 1.94, inversion: 30000000, saldoMantenimiento: 0 },
            { nombre: 'Rossy', porcentaje: 1.7, inversion: 15849000, saldoMantenimiento: 0 }
        ],
        nomina: [
            { cargo: 'Capitán', valorDia: 190000, dias: 5 },
            { cargo: 'Marinero 1', valorDia: 80000, dias: 5 },
            { cargo: 'Marinero 2', valorDia: 80000, dias: 5 },
            { cargo: 'Marinero 3', valorDia: 80000, dias: 5 },
            { cargo: 'Cocinero', valorDia: 80000, dias: 5 },
            { cargo: 'Maquinista 1', valorDia: 120000, dias: 5 },
            { cargo: 'Maquinista 2', valorDia: 100000, dias: 5 }
        ],
        pagosNomina: [
            { id: 1, fecha: '2025-10-30', viaje: 'Viaje #1', valor: 3200000, estado: 'Pagado' },
            { id: 2, fecha: '2025-11-14', viaje: 'Viaje #2', valor: 3200000, estado: 'Pagado' },
            { id: 3, fecha: '2025-11-24', viaje: 'Viaje #3', valor: 3200000, estado: 'Pagado' },
            { id: 4, fecha: '2025-12-07', viaje: 'Viaje #4', valor: 3200000, estado: 'Pagado' },
            { id: 5, fecha: '2025-12-28', viaje: 'Viaje #5', valor: 3200000, estado: 'Pagado' }
        ],
    },

    navItems: [
        { id: 'dashboard', label: 'Inicio', icon: 'trending-up' },
        { id: 'viajes', label: 'Viajes', icon: 'ship' },
        { id: 'cartera', label: 'Cartera', icon: 'wallet' },
        { id: 'documentos', label: 'Archivos', icon: 'file-scan' },
        { id: 'nomina', label: 'Nómina', icon: 'users' },
        { id: 'clientes', label: 'Clientes', icon: 'contact' },
        { id: 'finanzas', label: 'NIIF', icon: 'landmark' },
        { id: 'sociedad', label: 'Sociedad', icon: 'anchor' }
    ],

    // Métodos de Mutación (Acciones)
    setTab: (tab) => { App.state.activeTab = tab; App.render(); },
    setNiifTab: (tab) => { App.state.niifTab = tab; App.render(); },
    setDocTab: (tab) => { App.state.docTab = tab; App.render(); },
    setFilterVal: (key, val) => { App.state[key] = val; App.render(); },
    
    openModalViaje: (id) => { App.state.selectedViaje = App.state.viajes.find(v => v.id === id); App.render(); },
    openModalCliente: (clienteNombre) => { App.state.selectedCliente = App.state.carteraClientes.find(c => c.cliente === clienteNombre); App.render(); },
    closeModals: () => { 
        App.state.selectedViaje = null; 
        App.state.selectedCliente = null; 
        App.state.isAddViajeOpen = false;
        App.state.isAddClienteOpen = false;
        App.state.isAddNominaOpen = false;
        App.render(); 
    },

    // Calculadoras
    getTotales: () => {
        const s = App.state;
        const ingresoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.ingreso), 0);
        const gastoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.gastos), 0);
        const carteraTotal = s.carteraClientes.filter(c => c.estado === 'Pendiente').reduce((acc, curr) => acc + Number(curr.valorTotal), 0);
        const utilidadNeta = ingresoTotal - gastoTotal;
        const inversionTotal = s.socios.reduce((acc, curr) => acc + curr.inversion, 0);
        return { ingresoTotal, gastoTotal, carteraTotal, utilidadNeta, inversionTotal };
    },

    handleMockUpload: () => {
        App.state.isUploading = true;
        App.state.uploadSuccess = false;
        App.render();
        setTimeout(() => {
            App.state.isUploading = false;
            App.state.uploadSuccess = true;
            App.render();
        }, 2000);
    },

    // Handlers de formularios
    submitViaje: (e) => {
        e.preventDefault(); const f = e.target;
        App.state.viajes.push({
            id: App.state.viajes.length + 1, viaje: `Viaje #${App.state.viajes.length + 1}`,
            fecha: f.fecha.value, ruta: f.ruta.value, ingreso: Number(f.ingreso.value), 
            gastos: Number(f.gastos.value), cartera: Number(f.cartera.value || 0), observaciones: f.observaciones.value
        });
        App.closeModals();
    },
    submitCliente: (e) => {
        e.preventDefault(); const f = e.target;
        App.state.clientesDir.push({
            id: App.state.clientesDir.length + 1, nombre: f.nombre.value, tipo: f.tipo.value,
            telefono: f.telefono.value, ubicacion: f.ubicacion.value
        });
        App.closeModals();
    },
    submitNomina: (e) => {
        e.preventDefault(); const f = e.target;
        const totalNominaViaje = App.state.nomina.reduce((acc, curr) => acc + (curr.valorDia * curr.dias), 0);
        App.state.pagosNomina.unshift({
            id: App.state.pagosNomina.length + 1, fecha: f.fecha.value, viaje: f.viaje.value, 
            valor: totalNominaViaje, estado: 'Pagado'
        });
        App.closeModals();
    },

    /**
     * ==========================================
     * RENDERIZADORES DE VISTAS (COMPONENTES)
     * ==========================================
     */
    renderDashboard: () => {
        const t = App.getTotales();
        const margenOperativo = t.ingresoTotal > 0 ? ((t.utilidadNeta / t.ingresoTotal) * 100).toFixed(1) : 0;
        const eficienciaRecaudo = t.ingresoTotal > 0 ? (((t.ingresoTotal - t.carteraTotal) / t.ingresoTotal) * 100).toFixed(1) : 0;
        const roi = t.inversionTotal > 0 ? ((t.utilidadNeta / t.inversionTotal) * 100).toFixed(2) : 0;

        return `
        <div class="space-y-6 animate-fade-in print:hidden">
            <div>
                <h2 class="text-xl md:text-2xl font-bold text-slate-800">Dashboard Operativo</h2>
                <p class="text-sm text-slate-500">M/N Greicy Jireth - KPIs en Tiempo Real</p>
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><div class="flex justify-between items-center mb-2"><p class="text-xs font-bold text-slate-500 uppercase">Ingresos</p><div class="p-1.5 bg-blue-50 rounded-lg text-blue-600"><i data-lucide="trending-up" class="w-4 h-4"></i></div></div><h3 class="text-xl lg:text-2xl font-black text-slate-800">${formatCOP(t.ingresoTotal)}</h3></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><div class="flex justify-between items-center mb-2"><p class="text-xs font-bold text-slate-500 uppercase">Gastos</p><div class="p-1.5 bg-red-50 rounded-lg text-red-600"><i data-lucide="file-spreadsheet" class="w-4 h-4"></i></div></div><h3 class="text-xl lg:text-2xl font-black text-slate-800">${formatCOP(t.gastoTotal)}</h3></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><div class="flex justify-between items-center mb-2"><p class="text-xs font-bold text-slate-500 uppercase">Utilidad</p><div class="p-1.5 bg-green-50 rounded-lg text-green-600"><i data-lucide="trending-up" class="w-4 h-4"></i></div></div><h3 class="text-xl lg:text-2xl font-black text-slate-800">${formatCOP(t.utilidadNeta)}</h3></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><div class="flex justify-between items-center mb-2"><p class="text-xs font-bold text-slate-500 uppercase">Cartera</p><div class="p-1.5 bg-orange-50 rounded-lg text-orange-600"><i data-lucide="alert-circle" class="w-4 h-4"></i></div></div><h3 class="text-xl lg:text-2xl font-black text-slate-800">${formatCOP(t.carteraTotal)}</h3></div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 h-80 flex flex-col"><h3 class="text-sm font-bold text-slate-800 mb-4 flex items-center"><i data-lucide="trending-up" class="mr-2 text-blue-600 w-4 h-4"></i> Tendencia Financiera</h3><div class="flex-1 min-h-0 relative"><canvas id="lineChart"></canvas></div></div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 h-80 flex flex-col">
                    <h3 class="text-sm font-bold text-slate-800 mb-6 flex items-center"><i data-lucide="trending-up" class="mr-2 text-green-500 w-4 h-4"></i> Eficiencia y Rendimiento</h3>
                    <div class="flex-1 flex flex-col justify-around">
                        <div><div class="flex justify-between items-end mb-1"><span class="text-xs font-bold text-slate-500 uppercase">Margen Operativo</span><span class="text-sm font-black text-slate-800">${margenOperativo}%</span></div><div class="w-full bg-slate-100 rounded-full h-2.5"><div class="bg-blue-500 h-2.5 rounded-full" style="width: ${Math.min(margenOperativo, 100)}%"></div></div></div>
                        <div><div class="flex justify-between items-end mb-1"><span class="text-xs font-bold text-slate-500 uppercase">Eficiencia Recaudo</span><span class="text-sm font-black text-slate-800">${eficienciaRecaudo}%</span></div><div class="w-full bg-slate-100 rounded-full h-2.5"><div class="bg-green-500 h-2.5 rounded-full" style="width: ${Math.min(eficienciaRecaudo, 100)}%"></div></div></div>
                        <div><div class="flex justify-between items-end mb-1"><span class="text-xs font-bold text-slate-500 uppercase">ROI</span><span class="text-sm font-black text-slate-800">${roi}%</span></div><div class="w-full bg-slate-100 rounded-full h-2.5"><div class="bg-indigo-500 h-2.5 rounded-full" style="width: ${Math.min(roi, 100)}%"></div></div></div>
                    </div>
                </div>
            </div>
        </div>`;
    },

    renderViajes: () => `
        <div class="space-y-6 animate-fade-in print:hidden">
            <div class="flex justify-between items-center">
                <div><h2 class="text-2xl font-bold">Gestión de Viajes</h2><p class="text-sm text-slate-500">Historial operativo</p></div>
                <button onclick="App.state.isAddViajeOpen=true; App.render()" class="bg-blue-600 text-white px-4 py-2.5 rounded-xl shadow-sm font-bold hover:bg-blue-700 flex items-center"><i data-lucide="plus" class="w-4 h-4 mr-2"></i> Nuevo Viaje</button>
            </div>
            <div class="grid gap-3">
                ${[...App.state.viajes].reverse().map(v => `
                <div onclick="App.openModalViaje(${v.id})" class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center cursor-pointer hover:border-blue-300">
                    <div class="flex items-center"><div class="bg-slate-100 p-3 rounded-lg mr-4"><i data-lucide="map" class="w-5 h-5"></i></div><div><h4 class="font-bold text-slate-800">${v.viaje} <span class="text-xs text-slate-400 ml-2">${v.fecha}</span></h4><p class="text-sm text-slate-500">${v.ruta}</p></div></div>
                    <div class="text-right"><p class="text-[10px] uppercase font-bold text-slate-400">Utilidad</p><p class="font-black text-slate-800">${formatCOP(v.ingreso - v.gastos)}</p></div>
                </div>`).join('')}
            </div>
        </div>`,

    renderCartera: () => {
        const s = App.state;
        const cv = s.carteraViajeFiltro === 'Todos' ? s.carteraViajes : s.carteraViajes.filter(v => v.viaje === s.carteraViajeFiltro);
        const totalFiltro = cv.reduce((sum, i) => sum + i.valor, 0);

        return `
        <div class="space-y-6 animate-fade-in print:hidden">
            <div class="flex justify-between items-center">
                <div><h2 class="text-2xl font-bold">Cartera de Clientes</h2><p class="text-sm text-slate-500">Deudas consolidadas</p></div>
                <div class="bg-orange-100 text-orange-800 px-4 py-2.5 rounded-xl font-black border border-orange-200">Total Exigible: ${formatCOP(App.getTotales().carteraTotal)}</div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-[700px]">
                        <thead><tr class="bg-slate-50 border-b text-slate-500 text-xs uppercase font-bold"><th class="p-4">Cliente</th><th class="p-4">Concepto General</th><th class="p-4">Estado</th><th class="p-4 text-right">Total Adeudado</th></tr></thead>
                        <tbody>
                            ${s.carteraClientes.map(c => `
                            <tr onclick="App.openModalCliente('${c.cliente}')" class="border-b hover:bg-slate-50 cursor-pointer">
                                <td class="p-4 font-bold text-slate-800">${c.cliente}</td><td class="p-4 text-sm text-slate-600">${c.conceptoGeneral}</td>
                                <td class="p-4"><span class="text-[10px] font-bold uppercase bg-orange-100 text-orange-700 px-2 py-1 rounded-md">${c.estado}</span></td>
                                <td class="p-4 text-right font-bold text-orange-600">${formatCOP(c.valorTotal)}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="mt-8">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold flex items-center"><i data-lucide="ship" class="mr-2 text-slate-400 w-5 h-5"></i> Desglose por Viaje</h3>
                    <select onchange="App.setFilterVal('carteraViajeFiltro', this.value)" class="border rounded-lg p-2 text-sm bg-white">
                        <option value="Todos" ${s.carteraViajeFiltro === 'Todos'?'selected':''}>Ver Todos</option>
                        ${s.viajes.map(v => `<option value="${v.viaje}" ${s.carteraViajeFiltro === v.viaje?'selected':''}>${v.viaje}</option>`).join('')}
                    </select>
                </div>
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <table class="w-full text-left border-collapse min-w-[600px]">
                        <thead><tr class="bg-slate-50 border-b text-slate-500 text-xs uppercase font-bold"><th class="p-4">Viaje</th><th class="p-4">Cliente</th><th class="p-4">Concepto</th><th class="p-4 text-right">Monto</th></tr></thead>
                        <tbody>
                            ${cv.length ? cv.map(c => `
                            <tr class="border-b hover:bg-slate-50"><td class="p-4 text-sm font-bold">${c.viaje}</td><td class="p-4 text-sm">${c.cliente}</td><td class="p-4 text-sm text-slate-500">${c.concepto}</td><td class="p-4 text-right font-bold text-orange-600">${formatCOP(c.valor)}</td></tr>`).join('') 
                            : '<tr><td colspan="4" class="p-8 text-center text-slate-500">No hay deudas.</td></tr>'}
                            ${cv.length ? `<tr class="bg-orange-50"><td colspan="3" class="p-4 text-right font-bold text-orange-900 text-sm uppercase">Total:</td><td class="p-4 text-right font-black text-orange-700 text-lg">${formatCOP(totalFiltro)}</td></tr>` : ''}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>`;
    },

    renderDocumentos: () => {
        const s = App.state;
        let content = '';

        if(s.docTab === 'escaner') {
            content = `
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-10 text-center print:hidden">
                    <h3 class="font-bold text-xl mb-2">Carga Inteligente de Documentos</h3>
                    <p class="text-sm text-slate-500 mb-8">Sube archivos PDF o fotos de facturas para extraer datos.</p>
                    <div class="border-2 border-dashed border-blue-300 bg-blue-50/50 rounded-2xl p-10 flex flex-col items-center cursor-pointer hover:bg-blue-50">
                        <i data-lucide="file-image" class="text-blue-400 w-12 h-12 mb-4"></i>
                        <p class="font-bold text-lg">Arrastra tu PDF o Imagen aquí</p>
                        <button onclick="App.handleMockUpload()" ${s.isUploading ? 'disabled':''} class="mt-4 bg-blue-600 text-white px-6 py-3 rounded-xl font-bold disabled:bg-slate-400">
                            ${s.isUploading ? 'Procesando...' : 'Seleccionar Archivo'}
                        </button>
                    </div>
                    ${s.uploadSuccess ? `
                    <div class="mt-8 bg-green-50 border border-green-200 p-6 rounded-xl text-left animate-slide-up">
                        <div class="flex items-center text-green-700 font-bold text-lg mb-4"><i data-lucide="check-circle" class="mr-2"></i> Documento Analizado Exitosamente</div>
                        <div class="bg-white rounded-lg p-4 border border-green-100 grid grid-cols-2 gap-4 text-sm">
                            <div><span class="font-bold text-slate-500 block">Concepto</span>Combustible (Acpm)</div>
                            <div><span class="font-bold text-slate-500 block">Fecha</span>15/12/2025</div>
                            <div><span class="font-bold text-slate-500 block">Proveedor</span>EDS XYZ</div>
                            <div><span class="font-bold text-slate-500 block">Valor Extraído</span><span class="text-lg font-black">$ 3,450,000</span></div>
                        </div>
                    </div>` : ''}
                </div>`;

    renderSociedad: () => {
        const s = App.state;
        const meses = [...new Set(s.viajes.map(v => v.fecha.substring(0, 7)))].sort();
        const vFiltro = s.sociedadFiltroMes === 'Todos' ? s.viajes : s.viajes.filter(v => v.fecha.startsWith(s.sociedadFiltroMes));

        return `
        <div class="space-y-6 animate-fade-in print:hidden">
            <div class="flex justify-between items-center">

                </div>
            </div>
            <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl flex justify-between items-center shadow-sm"><span class="text-blue-800 font-bold text-sm">Utilidad generada (${s.sociedadFiltroMes}):</span><span class="text-blue-700 font-black text-2xl">${formatCOP(utilidadPeriodo)}</span></div>

                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead><tr class="bg-slate-50 border-b text-slate-500 text-xs uppercase font-bold"><th class="p-4">Socio</th><th class="p-4 text-center">% Part.</th><th class="p-4 text-right">Inversión Base</th><th class="p-4 text-right">Utilidad Bruta</th><th class="p-4 text-right">Deuda Mantenimiento</th><th class="p-4 text-right bg-green-50/50">Líquido a Recibir</th></tr></thead>
                    <tbody>
                        ${s.socios.map(socio => {
                            const utilBruta = utilidadPeriodo * (socio.porcentaje / 100);
                            let liquido = utilBruta;
                            if (socio.saldoMantenimiento < 0) {
                                const deudaAbs = Math.abs(socio.saldoMantenimiento);
                                liquido = utilBruta >= deudaAbs ? utilBruta - deudaAbs : 0;
                            }
                            return `
                            <tr class="border-b hover:bg-slate-50">
                                <td class="p-4 flex items-center"><div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center font-bold mr-3">${socio.nombre.charAt(0)}</div><span class="font-bold">${socio.nombre}</span></td>
                                <td class="p-4 text-center font-black text-blue-600">${socio.porcentaje}%</td><td class="p-4 text-right text-sm text-slate-600">${formatCOP(socio.inversion)}</td>
                                <td class="p-4 text-right font-bold">${formatCOP(utilBruta)}</td><td class="p-4 text-right text-xs"><span class="${socio.saldoMantenimiento < 0 ? 'text-red-500 font-bold bg-red-50 px-2 py-1 rounded' : 'text-slate-400'}">${socio.saldoMantenimiento < 0 ? formatCOP(socio.saldoMantenimiento) : 'Sin deuda'}</span></td>
                                <td class="p-4 text-right bg-green-50/30 font-black text-lg ${liquido > 0 ? 'text-green-600' : 'text-slate-400'}">${formatCOP(liquido)}</td>
                            </tr>`;
                        }).join('')}

                </table>
            </div>
        </div>`;

        // Modal Form Nómina
        if (s.isAddNominaOpen) {
            const tN = formatCOP(s.nomina.reduce((a, c) => a + (c.valorDia * c.dias), 0));

        if (s.selectedCliente) {

            h += `<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50" onclick="App.closeModals()"><div class="bg-white w-full max-w-md rounded-2xl overflow-hidden animate-slide-up" onclick="event.stopPropagation()"><div class="p-4 border-b bg-slate-50 flex justify-between items-center"><h3 class="font-bold text-lg"><i data-lucide="users" class="w-5 h-5 inline mr-1 text-blue-600"></i> ${c.cliente}</h3><button onclick="App.closeModals()"><i data-lucide="x" class="w-5 h-5"></i></button></div><div class="p-5"><div class="bg-orange-50 p-4 rounded-xl border border-orange-100 text-center mb-4"><p class="text-sm text-orange-800 font-bold mb-1">Deuda Total Consolidada</p><p class="text-3xl font-black text-orange-600">${formatCOP(c.valorTotal)}</p></div><button class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800">Registrar Abono a ${c.cliente}</button></div></div></div>`;

            const ctx = document.getElementById('lineChart');
            if(ctx) {
                const chartData = { labels: ['Oct', 'Nov', 'Dic'], ingresos: [66956000, 119571300, 114843500], gastos: [29107000, 45211300, 38800000]};
                if(window.dashChart) window.dashChart.destroy();
                window.dashChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: chartData.labels, datasets: [{ label: 'Ingresos', data: chartData.ingresos, borderColor: '#3b82f6', tension: 0.4, borderWidth: 3 }, { label: 'Gastos', data: chartData.gastos, borderColor: '#ef4444', tension: 0.4, borderWidth: 3 }]},
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, scales: { y: { display: false } } }
                });
            }
        }
    }
};

// Inicialización del Sistema
window.onload = () => {
    App.render();
};

</script>
</body>
