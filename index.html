<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Don Sebe Version 1.2</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icono.png">
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .animate-fade-in { animation: fadeIn 0.2s ease-in-out; }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-scale-in { animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .table-scroll { -webkit-overflow-scrolling: touch; }

        .pdf-render-chamber { position: absolute; left: -9999px; width: 900px; display: block; background: white; }
        .chart-print-container { height: 280px; width: 100%; margin: 15px 0; }
        
        @media print {
            body { background: white !important; font-size: 11px !important; color: #0f172a !important; }
            .print\:hidden { display: none !important; }
            .print\:block { display: block !important; }
            .pdf-render-chamber { position: relative !important; left: 0 !important; width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .shadow-sm, .shadow-md, .shadow-lg, .shadow-2xl { box-shadow: none !important; }
            .border { border: 1px solid #e2e8f0 !important; }
            #app-root { height: auto !important; overflow: visible !important; }
            main { padding: 0 !important; overflow: visible !important; }
            .print-section-divider { page-break-inside: avoid; border-top: 2px solid #cbd5e1; margin-top: 12px; padding-top: 12px; }
            .table-scroll { overflow: visible !important; }
            table { width: 95% !important; margin: 5px auto !important; table-layout: auto !important; border-collapse: collapse !important; border: 1px solid #cbd5e1 !important; }
            th, td { white-space: normal !important; word-wrap: break-word !important; padding: 4px 6px !important; font-size: 10px !important; border: 1px solid #e2e8f0 !important; text-align: center !important; vertical-align: middle !important; }
            th { background-color: #f8fafc !important; font-weight: bold !important; color: #0f172a !important; }
            th:first-child, td:first-child { text-align: left !important; }
            .chart-print-container { height: 180px !important; width: 100% !important; margin: 8px 0 !important; display: flex; justify-content: center; }
            canvas { max-height: 180px !important; width: auto !important; margin: 0 auto !important; page-break-inside: avoid; }
            .text-justify { text-align: justify !important; hyphens: auto; }
            h1, h2, h3, h4 { page-break-after: avoid; margin-bottom: 6px !important; }
            p { orphans: 3; widows: 3; margin-bottom: 6px !important; line-height: 1.4 !important; }
        }
    </style>
</head>
<body class="flex flex-col h-screen bg-slate-50 font-sans overflow-hidden text-slate-800">

    <div id="app-root" class="flex flex-col h-full w-full relative"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, doc, setDoc, getDoc, deleteDoc, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const fallbackConfig = {
    apiKey: "AIzaSyBLbvNxeF7SqjZ4tRSDH0O2BvIVrIuG764",
    authDomain: "nexus-jr.firebaseapp.com",
    projectId: "nexus-jr",
    storageBucket: "nexus-jr.firebasestorage.app",
    messagingSenderId: "273022472068",
    appId: "1:273022472068:web:74cf3c09e664d2a9f2d7d1"
};

let auth = null;
let db = null;
window.isFirebaseReady = false;
let currentUser = null;
window.activeFirebaseListeners = [];
window.hasLoadedFromCloud = {};

const appIdStr = typeof __app_id !== 'undefined' ? __app_id : "don-sebe-erp";

let firebaseConfig = fallbackConfig;
try {
    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        firebaseConfig = JSON.parse(__firebase_config);
    }
} catch (e) { console.warn("Configuración Firebase no encontrada:", e); }

try {
    const app = initializeApp(firebaseConfig);
    auth = getAuth(app);
    db = initializeFirestore(app, { localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() }) });
    window.isFirebaseReady = true;
} catch (error) { console.error("Firebase Error:", error); }

window.dbHelper = {
    save: (colName, id, data) => {
        const col = App.state[colName];
        const idx = col.findIndex(x => x.id === id);
        if (idx !== -1) col[idx] = { ...col[idx], ...data };
        else col.push({ id, ...data });
        if (!App.isAnyModalOpen()) App.render();
        if (!window.isFirebaseReady || !currentUser) return;
        const ref = doc(db, 'artifacts', appIdStr, 'public', 'data', colName, id.toString());
        setDoc(ref, data, { merge: true }).catch(e => console.error(`Error Sync [${colName}]:`, e));
    },
    saveBatch: (operations) => {
        operations.forEach(op => {
            const col = App.state[op.colName];
            const idx = col.findIndex(x => x.id === op.id);
            if (idx !== -1) col[idx] = { ...col[idx], ...op.data };
            else col.push({ id: op.id, ...op.data });
        });
        if (!App.isAnyModalOpen()) App.render();
        if (!window.isFirebaseReady || !currentUser) return;
        const batch = writeBatch(db);
        operations.forEach(op => {
            const ref = doc(db, 'artifacts', appIdStr, 'public', 'data', op.colName, op.id.toString());
            batch.set(ref, op.data, { merge: true });
        });
        batch.commit().catch(e => console.error("Error Sync [Batch]:", e));
    },
    remove: (colName, id) => {
        App.state[colName] = App.state[colName].filter(x => x.id !== id);
        if (!App.isAnyModalOpen()) App.render();
        if (!window.isFirebaseReady || !currentUser) return;
        const ref = doc(db, 'artifacts', appIdStr, 'public', 'data', colName, id.toString());
        deleteDoc(ref).catch(e => console.error(`Error Delete [${colName}]:`, e));
    }
};

const copFormatter = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0, maximumFractionDigits: 0 });
window.formatCOP = (value) => copFormatter.format(value || 0);

const App = {
    state: {
        activeTab: 'dashboard', niifTab: 'estado-situacion', docTab: 'escaner',
        uploadSuccess: false, isFabOpen: false, isSyncingData: false,
        carteraViajeFiltro: 'Todos', dbFiltroPeriodo: 'Todos', dbFiltroRuta: 'Todos',
        informePdfFiltro: 'Todos', informePdfDesde: '', informePdfHasta: '',
        dbActiveMatrix: 'viajes', 
        viajesFiltroRuta: 'Todos', viajesFiltroEstado: 'Todos',
        clientesFiltroSegmento: 'Todos', clientesFiltroDeuda: 'Todos',
        nominaFiltroViaje: 'Todos',
        dbTxFiltroTipo: 'Todos', dbTxFiltroModulo: 'Todos', dbClFiltroSegmento: 'Todos',
        dbTxFiltroPeriodo: 'Todos', 
        alertMsg: null,
        backupConfig: JSON.parse(localStorage.getItem('donsebe_backup_config')) || { auto: false, time: '18:00', last: '' },
        selectedViaje: null, selectedCliente: null, selectedSocio: null,
        isAddViajeOpen: false, isAddClienteOpen: false, isAddNominaOpen: false, isAddSocioOpen: false, isTransferOpen: false, isAddCuentaOpen: false, isAddTransaccionOpen: false,
        isPagoCarteraOpen: false, isAddUsuarioOpen: false,
        editingViajeId: null, editingClienteId: null, editingSocioId: null, editingCuentaId: null, editingUsuarioId: null,
        numpad: { isOpen: false, targetField: null, targetLabel: '', targetForm: 'viaje', value: '0' },
        formTemp: {
            viaje: { modalidad: 'unico', subClientes: [{ cliente: '', flete: '', abono: '' }], fecha: '', ruta: '', observaciones: '', productos: '', clientesAsociados: '', ingreso: 0, gastos: 0, cartera: 0, pagoFlete: 0, pagoCargue: 0, cuentaIngresoId: '', cuentaEgresoId: '' },
            pagoCartera: { idCarteraViaje: null, cliente: '', viaje: '', valorDeuda: 0, montoPagar: 0, cuentaId: '', fecha: '' },
            cliente: { nombre: '', nit: '', segmento: 'Persona Común', tipo: 'General', telefono: '', ubicacion: '' },
            nomina: { fecha: '', viaje: '', productosAsociados: '', clientesAsociados: '', cuentaId: '' },
            nominaCrew: [],
            socio: { nombre: '', porcentaje: 0, inversion: 0, saldoMantenimiento: 0, cuentaId: '' },
            transferencia: { vendedorId: '', compradorId: '', porcentaje: 0 },
            cuenta: { nombre: '', tipo: 'banco', saldoInicial: 0, numero: '' },
            transaccion: { tipo: 'ingreso', monto: 0, fecha: new Date().toISOString().split('T')[0], concepto: '', cuentaId: '', cuentaDestinoId: '' },
            usuario: { nombre: '', rol: 'usuario', permisoEdicion: false, modulosVisibles: [] }
        },
        config: {
            pdfIncludes: { balance: true, resultados: true, flujo: true, patrimonio: true, socios: true },
            ui: JSON.parse(localStorage.getItem('donsebe_ui_config')) || { theme: 'moderno' }
        },
        cuentas: [], transacciones: [], viajes: [], carteraViajes: [], carteraClientes: [], clientesDir: [], socios: [], pagosNomina: [], usuarios: [],
        nominaBase: [
            { id: 1, cargo: 'Capitán', valorDia: 250000, diasDefault: 5 },
            { id: 2, cargo: 'Marinero 1', valorDia: 150000, diasDefault: 5 },
            { id: 3, cargo: 'Marinero 2', valorDia: 150000, diasDefault: 5 },
            { id: 4, cargo: 'Marinero 3', valorDia: 150000, diasDefault: 5 },
            { id: 5, cargo: 'Cocinero', valorDia: 80000, diasDefault: 5 },
            { id: 6, cargo: 'Maquinista 1', valorDia: 120000, diasDefault: 5 },
            { id: 7, cargo: 'Maquinista 2', valorDia: 100000, diasDefault: 5 }
        ]
    },

    navItems: [
        { id: 'dashboard', label: 'Inicio', icon: 'trending-up' },
        { id: 'tesoreria', label: 'Cajas/Bancos', icon: 'wallet-cards' },
        { id: 'viajes', label: 'Viajes', icon: 'ship' },
        { id: 'finanzas', label: 'NIIF', icon: 'landmark' },
        { id: 'cartera', label: 'Cartera', icon: 'wallet' },
        { id: 'nomina', label: 'Nómina', icon: 'users' },
        { id: 'sociedad', label: 'Sociedad', icon: 'anchor' },
        { id: 'clientes', label: 'Clientes', icon: 'contact' },
        { id: 'documentos', label: 'Archivos', icon: 'file-scan' },
        { id: 'basedatos', label: 'BD Ingresos', icon: 'database' },
        { id: 'config', label: 'Ajustes', icon: 'settings' }
    ],

    isAnyModalOpen: () => {
        const s = App.state;
        return s.isAddViajeOpen || s.isAddClienteOpen || s.isAddNominaOpen || s.isAddSocioOpen || s.isTransferOpen || s.isAddCuentaOpen || s.isAddTransaccionOpen || s.isPagoCarteraOpen || s.isAddUsuarioOpen || s.numpad.isOpen || s.alertMsg !== null;
    },

    showAlert: (msg) => { App.state.alertMsg = msg; App.render(); },
    closeAlert: () => { App.state.alertMsg = null; App.render(); },

    setTab: (tab) => { App.state.activeTab = tab; App.state.isFabOpen = false; App.render(); },
    setFilterVal: (key, val) => { App.state[key] = val; App.render(); },

    renderDashboard: () => {
        const t = App.getTotales();
        return `
        <div class="space-y-6 animate-fade-in print:hidden">
            <div>
                <h2 class="text-xl md:text-2xl font-bold text-slate-800">Dashboard Operativo y Financiero</h2>
                <p class="text-sm text-slate-500">M/N Greicy Jireth - KPIs consolidados v1.2</p>
            </div>
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><p class="text-xs font-bold text-slate-500 uppercase">Ingresos Brutos</p><h3 class="text-xl font-black text-slate-800">${formatCOP(t.ingresoTotal)}</h3></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><p class="text-xs font-bold text-slate-500 uppercase">Util. Neta</p><h3 class="text-xl font-black text-green-600">${formatCOP(t.utilidadNeta)}</h3></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100"><p class="text-xs font-bold text-slate-500 uppercase">Cartera Activa</p><h3 class="text-xl font-black text-orange-600">${formatCOP(t.carteraTotal)}</h3></div>
                <div class="bg-slate-800 p-4 rounded-2xl shadow-sm text-white"><p class="text-xs font-bold text-slate-400 uppercase">Disp. Caja</p><h3 class="text-xl font-black text-white">${formatCOP(App.getSaldoTotalCuentas())}</h3></div>
            </div>
            <div class="mt-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h3 class="text-lg font-bold text-slate-800 mb-5 flex items-center"><i data-lucide="layout-grid" class="mr-2 text-blue-600 w-5 h-5"></i> Módulos del Sistema</h3>
                <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-7 gap-4">
                    ${App.navItems.filter(item => item.id !== 'dashboard').map(item => `
                        <button onclick="window.App.setTab('${item.id}')" class="flex flex-col items-center justify-center p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:bg-blue-50 transition-all group">
                            <i data-lucide="${item.icon}" class="w-6 h-6 text-slate-600 group-hover:text-blue-600 mb-2"></i>
                            <span class="text-[10px] font-bold text-slate-700">${item.label}</span>
                        </button>
                    `).join('')}
                </div>
            </div>
        </div>`;
    },

    getTotales: () => {
        const s = App.state;
        const ingresoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.ingreso || 0), 0);
        const gastoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.gastos || 0), 0);
        const utilidadNeta = ingresoTotal - gastoTotal;
        const carteraTotal = s.carteraClientes.filter(c => c.estado === 'Pendiente').reduce((acc, curr) => acc + Number(curr.valorTotal), 0);
        const inversionTotal = s.socios.reduce((acc, curr) => acc + Number(curr.inversion || 0), 0);
        return { ingresoTotal, gastoTotal, utilidadNeta, carteraTotal, inversionTotal };
    },

    getSaldoCuenta: (cuentaId) => {
        const s = App.state; const cuenta = s.cuentas.find(c => c.id === cuentaId); if(!cuenta) return 0;
        let saldo = cuenta.saldoInicial || 0;
        s.transacciones.filter(t => t.cuentaId === cuentaId).forEach(t => { if(t.tipo === 'ingreso') saldo += t.monto; if(t.tipo === 'egreso') saldo -= t.monto; });
        return saldo;
    },
    getSaldoTotalCuentas: () => App.state.cuentas.reduce((acc, c) => acc + App.getSaldoCuenta(c.id), 0),

    render: () => {
        const root = document.getElementById('app-root');
        let content = App.state.activeTab === 'dashboard' ? App.renderDashboard() : `<div class="p-8 text-center text-slate-400">Módulo ${App.state.activeTab} en mantenimiento reactivo.</div>`;
        
        root.innerHTML = `
            <header class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
                <div class="flex items-center">
                    <h1 class="text-xl font-black text-slate-800 flex items-center cursor-pointer" onclick="App.setTab('dashboard')"><i data-lucide="anchor" class="mr-2 text-blue-600"></i> Don Sebe v1.2</h1>
                </div>
                <div class="bg-slate-900 text-white px-3 py-1 rounded-full text-xs font-bold">
                    ${navigator.onLine ? 'En Línea' : 'Modo Offline'}
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-6 bg-slate-50">
                <div class="max-w-6xl mx-auto">${content}</div>
            </main>
        `;
        if (window.lucide) window.lucide.createIcons();
    },

    applyTheme: () => { console.log("Tema aplicado."); }
};

window.App = App;

window.runInitialMigration = async (silent = false) => {
    const ops = [];
    ops.push({ colName: 'usuarios', id: 1, data: { id: 1, nombre: 'Admin Master', rol: 'admin', permisoEdicion: true, modulosVisibles: App.navItems.map(i => i.id) } });

    const initCuentas = [
        { id: 1, nombre: 'Banco Agrario Principal', tipo: 'banco', saldoInicial: 10000000, numero: '123-456-789' },
        { id: 2, nombre: 'Efectivo Barcos', tipo: 'caja', saldoInicial: 3731255, numero: 'Efectivo' }
    ];
    initCuentas.forEach(c => ops.push({ colName: 'cuentas', id: c.id, data: c }));

    const initSocios = [
        { id: 1, nombre: 'PRI (Socio 40%)', porcentaje: 40.0, inversion: 447637320, saldoMantenimiento: -81900472, utilidadCausada: 88998444 },
        { id: 2, nombre: 'Enel-Luz', porcentaje: 39.0, inversion: 766593300, saldoMantenimiento: 0, utilidadCausada: 86773482 }
    ];
    initSocios.forEach(s => ops.push({ colName: 'socios', id: s.id, data: s }));

    await window.dbHelper.saveBatch(ops);
    if (!silent) App.showAlert("✅ Sincronización Inicial v1.2 Exitosa.");
    App.render();
};

window.onload = () => {
    window.App.render();
    if (window.isFirebaseReady) {
        signInAnonymously(auth).then(() => {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    const sysRef = doc(db, 'artifacts', appIdStr, 'public', 'data', '_system', 'metadata');
                    const sysSnap = await getDoc(sysRef);
                    if (!sysSnap.exists()) {
                        await window.runInitialMigration(true);
                        await setDoc(sysRef, { initialized: true, createdAt: new Date().toISOString() });
                    }
                    ['cuentas', 'transacciones', 'viajes', 'clientesDir', 'socios', 'pagosNomina', 'carteraViajes', 'carteraClientes', 'usuarios'].forEach(col => {
                        onSnapshot(collection(db, 'artifacts', appIdStr, 'public', 'data', col), (snap) => {
                            App.state[col] = snap.docs.map(d => d.data());
                            if (!App.isAnyModalOpen()) App.render();
                        });
                    });
                }
            });
        });
    }
};
</script>
</body>
</html>
