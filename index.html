/**

const App = {

        isAddViajeOpen: false, isAddClienteOpen: false, isAddNominaOpen: false, isAddSocioOpen: false, isTransferOpen: false, isAddCuentaOpen: false, isAddTransaccionOpen: false,

    ],

    // Métodos (Acciones Básicas)
    setTab: (tab) => { App.state.activeTab = tab; App.state.isFabOpen = false; App.render(); },
    setNiifTab: (tab) => { App.state.niifTab = tab; App.render(); },
    setDocTab: (tab) => { App.state.docTab = tab; App.render(); },
    setFilterVal: (key, val) => { App.state[key] = val; App.render(); },
    togglePdfConfig: (key) => { App.state.config.pdfIncludes[key] = !App.state.config.pdfIncludes[key]; App.render(); },
    
    // Función Magica de Sincronización
    syncToCloud: async () => {
        App.state.isSyncingData = true; App.render();
        try {
            const colecciones = ['cuentas', 'transacciones', 'viajes', 'clientesDir', 'socios', 'pagosNomina'];
            for (let col of colecciones) {
                for (let item of SEED_DATA[col]) {
                    await window.dbHelper.save(col, item.id, item);
                }
            }
            alert("✅ ¡Migración Completada! Tus datos de prueba ahora están seguros en Firebase.");
        } catch (e) {
            console.error(e);
            alert("❌ Error sincronizando los datos con la Nube. Revisa la consola.");
        }
        App.state.isSyncingData = false; App.render();
    },

    // Configuración UI
    setUIConfig: (key, val) => { App.state.config.ui[key] = val; App.applyTheme(); App.render(); },
    applyTheme: () => {
        const ui = App.state.config.ui; const root = document.documentElement;
        if(ui.textSize === 'small') root.style.fontSize = '14px'; else if(ui.textSize === 'large') root.style.fontSize = '18px'; else root.style.fontSize = '16px';
        let styleTag = document.getElementById('dynamic-theme');
        if(!styleTag) { styleTag = document.createElement('style'); styleTag.id = 'dynamic-theme'; document.head.appendChild(styleTag); }
        if(ui.isDark) {
            styleTag.innerHTML = `body, main, .bg-slate-50 { background-color: #0f172a !important; color: #f8fafc !important; } .bg-white { background-color: #1e293b !important; border-color: #334155 !important; } .text-slate-800, .text-slate-900 { color: #f8fafc !important; } .text-slate-700, .text-slate-600 { color: #cbd5e1 !important; } .text-slate-500, .text-slate-400 { color: #94a3b8 !important; } .border-slate-100, .border-slate-200, .border-slate-300 { border-color: #334155 !important; } header, select, input, textarea { background-color: #0f172a !important; color: #f8fafc !important; border-color: #334155 !important; } table th { background-color: #0f172a !important; color: #f8fafc !important; } .bg-blue-50, .bg-red-50, .bg-green-50, .bg-orange-50, .bg-indigo-50 { background-color: #1e293b !important; border-color: #334155 !important; } .modal-box { background-color: #1e293b !important; color: #f8fafc !important; } @media print { * { color: black !important; background: white !important; } }`;
        } else {
            styleTag.innerHTML = `body, main { background-color: ${ui.bgColor} !important; color: ${ui.textColor} !important; }`;
        }
    },
    exportToExcel: () => {
        const viajes = App.state.viajes; if(!viajes.length) { alert("No hay datos para exportar."); return; }
        const headers = ['ID', 'Fecha', 'Viaje/Documento', 'Periodo', 'Ruta', 'Ingreso Bruto', 'Gastos Operativos', 'Utilidad Bruta', 'Cartera Acumulada', 'Ingreso Recaudado (Caja)', 'Clientes', 'Productos', 'Pago Flete', 'Pago Cargue', 'Observaciones'];
        const rows = viajes.map(v => [ v.id, v.fecha, `"${v.viaje}"`, `"${v.periodo}"`, `"${v.ruta}"`, v.ingreso, v.gastos, v.utilidadBruta, v.cartera, v.ingresoRecaudado, `"${v.clientesAsociados || ''}"`, `"${v.productos || ''}"`, v.pagoFlete || 0, v.pagoCargue || 0, `"${v.observaciones || ''}"` ]);
        let csvContent = "\uFEFF" + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }); const url = URL.createObjectURL(blob);
        const link = document.createElement("a"); link.setAttribute("href", url); link.setAttribute("download", `DonSebe_Backup_${new Date().toISOString().split('T')[0]}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    },
    
    // FUNCIONES DEL NUMPAD
    openNumpad: (targetField, label, formTarget = 'viaje') => { App.state.numpad.isOpen = true; App.state.numpad.targetField = targetField; App.state.numpad.targetLabel = label; App.state.numpad.targetForm = formTarget; App.state.numpad.value = App.state.formTemp[formTarget][targetField] ? App.state.formTemp[formTarget][targetField].toString() : '0'; App.render(); },
    handleNumpadClick: (key) => {
        let val = App.state.numpad.value;
        if(key === 'DEL') val = val.length > 1 ? val.slice(0, -1) : '0'; else if(key === 'CLEAR') val = '0'; 
        else { if(val.length > 12) return; if (val === '0') val = key === '000' ? '0' : key; else val += key; }
        App.state.numpad.value = val; App.state.formTemp[App.state.numpad.targetForm][App.state.numpad.targetField] = parseInt(val, 10); App.render();
    },
    closeNumpad: () => { App.state.numpad.isOpen = false; App.render(); },

    // CORE TESORERÍA Y FINANZAS
    getSaldoCuenta: (cuentaId) => {
        const s = App.state; const cuenta = s.cuentas.find(c => c.id === cuentaId); if(!cuenta) return 0;
        let saldo = cuenta.saldoInicial || 0;
        s.transacciones.filter(t => t.cuentaId === cuentaId).forEach(t => { if(t.tipo === 'ingreso') saldo += t.monto; if(t.tipo === 'egreso') saldo -= t.monto; });
        return saldo;
    },
    getSaldoTotalCuentas: () => App.state.cuentas.reduce((acc, c) => acc + App.getSaldoCuenta(c.id), 0),
    
    // CRUD CUENTAS (Cajas/Bancos)
    openAddCuenta: () => { App.state.editingCuentaId = null; App.state.formTemp.cuenta = { nombre: '', tipo: 'banco', saldoInicial: 0, numero: '' }; App.state.isAddCuentaOpen = true; App.render(); },
    editCuenta: (id) => { const c = App.state.cuentas.find(x => x.id === id); if(!c) return; App.state.editingCuentaId = id; App.state.formTemp.cuenta = { ...c }; App.state.isAddCuentaOpen = true; App.render(); },
    deleteCuenta: async (id, btnElement) => {
        if(btnElement.innerText === 'Eliminar Cuenta') { btnElement.innerText = 'Confirmar Borrado'; btnElement.classList.replace('bg-slate-100', 'bg-red-600'); btnElement.classList.replace('text-red-600', 'text-white'); } 
        else { await window.dbHelper.remove('cuentas', id); App.closeModals(); }
    },
    submitCuenta: async (e) => {
        e.preventDefault(); const f = e.target;
        const data = { nombre: f.nombre.value, tipo: f.tipo.value, numero: f.numero.value, saldoInicial: App.state.formTemp.cuenta.saldoInicial };
        const newId = App.state.editingCuentaId || Date.now();
        await window.dbHelper.save('cuentas', newId, { id: newId, ...data });
        App.closeModals();
    },
    
    // TRANSACCIONES MANUALES
    openAddTransaccion: () => { App.state.formTemp.transaccion = { tipo: 'ingreso', monto: 0, fecha: new Date().toISOString().split('T')[0], concepto: '', cuentaId: '', cuentaDestinoId: '' }; App.state.isAddTransaccionOpen = true; App.render(); },
    submitTransaccionManual: async (e) => {
        e.preventDefault(); const f = e.target; const t = App.state.formTemp.transaccion; const cuentaOrigen = parseInt(f.cuentaId.value);
        if (t.monto <= 0 || !cuentaOrigen) { alert("Datos inválidos."); return; }

        if (t.tipo === 'transferencia') {
            const cuentaDest = parseInt(f.cuentaDestinoId.value); if(cuentaOrigen === cuentaDest || !cuentaDest) { alert("Cuentas deben ser distintas."); return; }
            const idRet = Date.now();
            await window.dbHelper.save('transacciones', idRet, { id: idRet, cuentaId: cuentaOrigen, tipo: 'egreso', monto: t.monto, fecha: f.fecha.value, concepto: `Transferencia a #${cuentaDest} - ${f.concepto.value}`, modulo: 'Tesoreria', referencia: null });
            await window.dbHelper.save('transacciones', idRet + 1, { id: idRet + 1, cuentaId: cuentaDest, tipo: 'ingreso', monto: t.monto, fecha: f.fecha.value, concepto: `Transferencia de #${cuentaOrigen} - ${f.concepto.value}`, modulo: 'Tesoreria', referencia: null });
        } else {
            const newId = Date.now();
            await window.dbHelper.save('transacciones', newId, { id: newId, cuentaId: cuentaOrigen, tipo: t.tipo, monto: t.monto, fecha: f.fecha.value, concepto: f.concepto.value, modulo: 'Tesoreria', referencia: null });
        }

    submitTransferencia: async (e) => {
        e.preventDefault(); const f = e.target; const vId = parseInt(f.vendedor.value); const cId = parseInt(f.comprador.value); const pctStr = f.porcentaje.value.replace(',', '.'); const pct = parseFloat(pctStr);
        if(vId === cId) return; const s = App.state.socios; const vIdx = s.findIndex(x => x.id === vId); const cIdx = s.findIndex(x => x.id === cId);
        if(vIdx === -1 || cIdx === -1 || pct <= 0 || pct > s[vIdx].porcentaje) return;

        const fraction = pct / s[vIdx].porcentaje; const invTransfer = s[vIdx].inversion * fraction; const deudaTransfer = s[vIdx].saldoMantenimiento * fraction;
        
        await window.dbHelper.save('socios', vId, { ...s[vIdx], porcentaje: s[vIdx].porcentaje - pct, inversion: s[vIdx].inversion - invTransfer, saldoMantenimiento: s[vIdx].saldoMantenimiento - deudaTransfer });
        await window.dbHelper.save('socios', cId, { ...s[cIdx], porcentaje: s[cIdx].porcentaje + pct, inversion: s[cIdx].inversion + invTransfer, saldoMantenimiento: s[cIdx].saldoMantenimiento + deudaTransfer });

    // Generador Dinámico de Periodos Financieros (A partir de Viajes)
    getInformePeriodos: () => {
        const s = App.state;
        const periodosMap = {};
        s.viajes.forEach(v => {
            if (!periodosMap[v.periodo]) {
                periodosMap[v.periodo] = { periodo: v.periodo, ingresoProy: 0, ingresoReal: 0, utilProy: 0, utilReal: 0, cartera: 0, gastos: 0 };
            }
            periodosMap[v.periodo].ingresoProy += Number(v.ingreso);
            periodosMap[v.periodo].ingresoReal += Number(v.ingresoRecaudado);
            periodosMap[v.periodo].gastos += Number(v.gastos);
            periodosMap[v.periodo].utilProy += Number(v.utilidadBruta);
            periodosMap[v.periodo].cartera += Number(v.cartera);
            periodosMap[v.periodo].utilReal += (Number(v.ingresoRecaudado) - Number(v.gastos));
        });
        return Object.values(periodosMap);
    },

    // Calculadoras Maestras
    getTotales: () => {
        const s = App.state;
        const ingresoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.ingreso), 0);
        const gastoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.gastos), 0);
        const utilidadBruta = s.viajes.reduce((acc, curr) => acc + Number(curr.utilidadBruta), 0);
        // Cartera ahora calculada desde viajes (exactitud absoluta)
        const carteraTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.cartera), 0); 
        const utilidadNeta = ingresoTotal - gastoTotal; 
        const ingresoRecaudado = s.viajes.reduce((acc, curr) => acc + Number(curr.ingresoRecaudado), 0);
        const inversionTotal = s.socios.reduce((acc, curr) => acc + Number(curr.inversion), 0);
        const deudaMantenimientoTotal = s.socios.filter(s => s.saldoMantenimiento < 0).reduce((acc, curr) => acc + Math.abs(curr.saldoMantenimiento), 0);
        return { ingresoTotal, gastoTotal, utilidadBruta, carteraTotal, utilidadNeta, ingresoRecaudado, inversionTotal, deudaMantenimientoTotal };
    },

    renderSociedad: () => {
        const s = App.state;

        const utilidadPeriodo = vFiltro.reduce((acc, v) => acc + v.utilidadBruta, 0); 
        
        const t = App.getTotales();
        const tasaRecuperacion = t.inversionTotal > 0 ? ((t.utilidadNeta / t.inversionTotal) * 100).toFixed(2) : 0;
        const apalancamiento = t.utilidadNeta > 0 ? ((t.deudaMantenimientoTotal / t.utilidadNeta) * 100).toFixed(2) : 0;
        const margenNetoGlobal = t.ingresoTotal > 0 ? ((t.utilidadNeta / t.ingresoTotal) * 100).toFixed(2) : 0;

                    <button onclick="App.state.isAddSocioOpen=true; App.state.editingSocioId=null; App.render()" class="bg-blue-600 text-white px-3 py-2 rounded-lg text-xs font-bold hover:bg-blue-700 transition-colors shadow-sm flex items-center whitespace-nowrap"><i data-lucide="plus" class="w-4 h-4 mr-1"></i> Añadir Socio</button>
                    <div class="flex items-center space-x-2 bg-white border border-slate-300 shadow-sm rounded-lg p-1.5 w-full sm:w-auto mt-2 sm:mt-0">
                        <i data-lucide="calendar" class="w-4 h-4 text-slate-400 ml-1"></i>
                        <select onchange="App.setFilterVal('sociedadFiltroMes', this.value)" class="text-sm font-medium outline-none bg-transparent cursor-pointer w-full">
                            <option value="Todos" ${s.sociedadFiltroMes==='Todos'?'selected':''}>Histórico Total</option>
                            ${periodos.map(m => `<option value="${m}" ${s.sociedadFiltroMes===m?'selected':''}>${m}</option>`).join('')}
                        </select>
                    </div>
                </div>
            </div>

            <!-- Indicadores Financieros Superiores -->

                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wide">Tasa Recuperación Capital</p>
                    <p class="text-2xl font-black text-blue-600">${tasaRecuperacion}%</p>
                    <p class="text-[10px] text-slate-400 mt-1 leading-tight">Porcentaje de la inversión original de los socios que ya ha sido recuperada en utilidades.</p>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wide">Apalancamiento / Deuda</p>
                    <p class="text-2xl font-black text-red-500">${apalancamiento}%</p>
                    <p class="text-[10px] text-slate-400 mt-1 leading-tight">Proporción de la deuda de mantenimiento global frente a la utilidad neta generada. A menor %, mejor.</p>
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-wide">Margen de Utilidad Global</p>
                    <p class="text-2xl font-black text-green-600">${margenNetoGlobal}%</p>
                    <p class="text-[10px] text-slate-400 mt-1 leading-tight">Mide la rentabilidad neta real de las ventas (Fletes) después de asumir todos los gastos del negocio.</p>
                </div>
            </div>

            <div class="bg-blue-50 border border-blue-200 p-4 sm:p-5 rounded-2xl flex flex-col sm:flex-row justify-between items-start sm:items-center shadow-sm gap-2 sm:gap-0 mt-2">
                <span class="text-blue-900 font-bold text-sm sm:text-base">Masa de Utilidad a Repartir (${s.sociedadFiltroMes}):</span>
                <span class="text-blue-700 font-black text-2xl sm:text-3xl">${formatCOP(utilidadPeriodo)}</span>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                <div class="w-full overflow-x-auto table-scroll">
                    <table class="w-full text-left border-collapse min-w-[900px]">
                        <thead><tr class="bg-slate-800 border-b text-white text-[10px] sm:text-xs uppercase font-bold"><th class="p-3 sm:p-4">Inversionista</th><th class="p-3 sm:p-4 text-center">% Part.</th><th class="p-3 sm:p-4 text-center bg-indigo-900">ROI %</th><th class="p-3 sm:p-4 text-right">Inversión Base</th><th class="p-3 sm:p-4 text-right">Util. Causada</th><th class="p-3 sm:p-4 text-right">Descuentos</th><th class="p-3 sm:p-4 text-right bg-green-600">Saldo Líquido Actual</th></tr></thead>

                                const utilBruta = s.sociedadFiltroMes === 'Todos' ? socio.utilidadCausada : utilidadPeriodo * (socio.porcentaje / 100);

                                if (socio.saldoMantenimiento < 0 && s.sociedadFiltroMes === 'Todos') {
                                    const deudaAbs = Math.abs(socio.saldoMantenimiento);
                                    liquido = utilBruta - deudaAbs;

                                    <td class="p-3 sm:p-4 text-right text-xs sm:text-sm font-medium text-slate-600 whitespace-nowrap">${formatCOP(socio.inversion)}</td>
                                    <td class="p-3 sm:p-4 text-right font-bold text-slate-700 whitespace-nowrap">${formatCOP(utilBruta)}</td>
                                    <td class="p-3 sm:p-4 text-right text-[10px] sm:text-xs whitespace-nowrap"><span class="${socio.saldoMantenimiento < 0 ? 'text-red-600 font-black bg-red-50 border border-red-100 px-2 py-1.5 rounded-lg shadow-sm' : 'text-slate-400 font-medium'}">${socio.saldoMantenimiento < 0 ? formatCOP(socio.saldoMantenimiento) : 'A Paz y Salvo'}</span></td>

                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>`;
    },

                        </div>
                        <div class="border-t pt-4 mt-2">
                            <button onclick="App.deleteSocio(${socio.id}, this)" class="bg-slate-100 text-red-600 px-4 py-3 rounded-xl text-xs font-bold hover:bg-red-50 transition-colors w-full flex justify-center items-center"><i data-lucide="trash-2" class="w-4 h-4 mr-2"></i> Eliminar Registro</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        // Formulario Agregar / Editar Socio
        if (s.isAddSocioOpen) {
            const fSocio = s.formTemp.socio;
            const titulo = s.editingSocioId ? 'Editar Inversor' : 'Nuevo Inversor';
            const isDeuda = s.editingSocioId ? (App.state.socios.find(x => x.id === s.editingSocioId).saldoMantenimiento < 0) : true;
            
            h += `<div class="${modalContainerClass}"><div class="${modalBoxClass}"><div class="flex justify-between items-center mb-5"><h3 class="font-black text-xl text-slate-800">${titulo}</h3><button onclick="App.closeModals()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button></div><form onsubmit="App.submitSocio(event)" class="space-y-4">
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Nombre o Razón Social</label><input name="nombre" type="text" value="${fSocio.nombre}" required placeholder="Ej: Socio Principal" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none"/></div>
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Porcentaje de Participación (%)</label><input name="porcentaje" type="number" step="0.01" min="0" max="100" value="${fSocio.porcentaje}" required placeholder="Ej: 15.5" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none"/></div>
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Capital Invertido</label><div onclick="App.openNumpad('inversion', 'Inversión Base', 'socio')" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm bg-slate-50 text-slate-800 font-bold cursor-pointer hover:border-blue-400 truncate">${formatCOP(fSocio.inversion)}</div></div>
                ${!s.editingSocioId ? `<div class="space-y-1 bg-green-50 p-3 rounded-xl border border-green-200"><label class="text-[10px] font-bold text-green-700 uppercase">¿A qué cuenta ingresa esta inversión?</label><select name="cuentaId" required class="w-full border border-green-300 p-2 rounded text-sm outline-none bg-white"><option value="">Seleccione cuenta destino...</option>${s.cuentas.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('')}</select></div>` : ''}
                <div class="grid grid-cols-5 gap-3 items-end">
                    <div class="col-span-3 space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Saldo Mantenimiento Extra</label><div onclick="App.openNumpad('saldoMantenimiento', 'Saldo de Mantenimiento', 'socio')" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm bg-slate-50 text-slate-800 font-bold cursor-pointer hover:border-blue-400 truncate">${formatCOP(fSocio.saldoMantenimiento)}</div></div>
                    <div class="col-span-2 space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Tipo</label><select name="tipoSaldo" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none bg-white"><option value="deuda" ${isDeuda ? 'selected' : ''}>Es Deuda (-)</option><option value="favor" ${!isDeuda ? 'selected' : ''}>A Favor (+)</option></select></div>
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-slate-800 shadow-lg transition-all mt-2">Guardar Socio</button></form></div></div>`;
        }

        // Modal Transferir Acciones
        if (s.isTransferOpen) {
            h += `<div class="${modalContainerClass}"><div class="${modalBoxClass}"><div class="flex justify-between items-center mb-5"><h3 class="font-black text-xl text-slate-800"><i data-lucide="arrow-right-left" class="w-5 h-5 inline mr-2 text-indigo-600"></i> Transferir Acciones</h3><button onclick="App.closeModals()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button></div>
                <p class="text-xs text-slate-500 mb-4">Esta acción descontará el porcentaje y capital base proporcional del socio origen, sumándolo al socio receptor.</p>
                <form onsubmit="App.submitTransferencia(event)" class="space-y-4">
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Vendedor (Quien cede)</label><select name="vendedor" required class="w-full border-2 border-red-200 p-3 rounded-xl text-sm outline-none bg-red-50 text-red-900"><option value="">Seleccione origen...</option>${s.socios.map(socio => `<option value="${socio.id}">${socio.nombre} (Tiene: ${socio.porcentaje}%)</option>`).join('')}</select></div>
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Comprador (Quien recibe)</label><select name="comprador" required class="w-full border-2 border-green-200 p-3 rounded-xl text-sm outline-none bg-green-50 text-green-900"><option value="">Seleccione receptor...</option>${s.socios.map(socio => `<option value="${socio.id}">${socio.nombre} (Tiene: ${socio.porcentaje}%)</option>`).join('')}</select></div>
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Porcentaje a Transferir (%)</label><input name="porcentaje" type="number" step="0.01" min="0.01" max="100" required placeholder="Ej: 5.0" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none"/></div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all mt-4">Ejecutar Transferencia</button></form></div></div>`;
        }

        return h;
    },

    // Renderizador Principal (Refresca el HTML)
    render: () => {
        const root = document.getElementById('app-root');
        
        let mainContent = '';
        switch(App.state.activeTab) {
            case 'dashboard': mainContent = App.renderDashboard(); break;
            case 'tesoreria': mainContent = App.renderTesoreria(); break;
            case 'viajes': mainContent = App.renderViajes(); break;
            case 'cartera': mainContent = App.renderCartera(); break;
            case 'documentos': mainContent = App.renderDocumentos(); break;
            case 'nomina': mainContent = App.renderNomina(); break;
            case 'clientes': mainContent = App.renderClientes(); break;
            case 'finanzas': mainContent = App.renderNIIF(); break;
            case 'sociedad': mainContent = App.renderSociedad(); break;
            case 'basedatos': mainContent = App.renderBaseDatos(); break;
            case 'config': mainContent = App.renderConfig(); break;
        }

        root.innerHTML = `
            ${App.renderModals()}
            
            <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center z-10 shrink-0 print:hidden shadow-sm sticky top-0">
                <div class="flex items-center">
                    ${App.state.activeTab !== 'dashboard' ? `<button onclick="App.setTab('dashboard')" class="mr-3 sm:mr-4 bg-slate-100 p-2 rounded-full text-slate-600 hover:bg-slate-200 transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>` : ''}
                    <h1 onclick="App.setTab('dashboard')" class="text-lg sm:text-xl font-black text-slate-800 flex items-center tracking-tight cursor-pointer hover:text-blue-600 transition-colors"><i data-lucide="anchor" class="mr-2 text-blue-600 w-5 h-5 sm:w-6 sm:h-6"></i> Don Sebe</h1>
                </div>
                <div class="bg-slate-900 text-white px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold shadow-md flex items-center"><div class="w-2 h-2 ${window.isFirebaseReady ? 'bg-green-400 animate-pulse' : 'bg-red-400'} rounded-full mr-2"></div> ${window.isFirebaseReady ? 'Cloud Sync' : 'Modo Offline (Local)'}</div>
            </header>
            
            <main class="flex-1 overflow-y-auto p-4 md:p-6 pb-8 bg-slate-50 print:bg-white print:p-0 print:overflow-visible">
                <div class="max-w-6xl mx-auto">${mainContent}</div>
            </main>

            <!-- FAB Botón Flotante -->
            <div class="fixed bottom-6 right-6 z-50 print:hidden flex flex-col items-end space-y-3">
                ${App.state.isFabOpen ? `
                    <button onclick="App.state.isAddViajeOpen=true; App.state.editingViajeId=null; App.state.isFabOpen=false; App.render()" class="bg-blue-600 text-white p-3.5 rounded-full shadow-lg hover:bg-blue-700 flex items-center animate-fade-in transition-transform hover:scale-105"><span class="mr-3 font-bold text-xs bg-slate-800 px-2 py-1 rounded shadow">Nuevo Viaje</span><i data-lucide="ship" class="w-5 h-5"></i></button>
                    <button onclick="App.state.isAddClienteOpen=true; App.state.editingClienteId=null; App.state.isFabOpen=false; App.render()" class="bg-green-600 text-white p-3.5 rounded-full shadow-lg hover:bg-green-700 flex items-center animate-fade-in transition-transform hover:scale-105"><span class="mr-3 font-bold text-xs bg-slate-800 px-2 py-1 rounded shadow">Nuevo Cliente</span><i data-lucide="user-plus" class="w-5 h-5"></i></button>
                ` : ''}
                <button onclick="App.state.isFabOpen = !App.state.isFabOpen; App.render()" class="bg-slate-900 text-white p-4 rounded-full shadow-2xl hover:bg-slate-800 active:scale-95 transition-transform">
                    <i data-lucide="${App.state.isFabOpen ? 'x' : 'plus'}" class="w-6 h-6 transition-transform ${App.state.isFabOpen ? 'rotate-90' : ''}"></i>
                </button>
            </div>
        `;

        if (window.lucide) lucide.createIcons();

        // Renderizado gráfico Avanzado
        if(App.state.activeTab === 'dashboard') {
            const ctx = document.getElementById('lineChart');
            if(ctx) {
                const s = App.state;
                let dataToRender = App.getInformePeriodos();
                if (s.dashboardChartFiltro === 'Ultimos2') dataToRender = dataToRender.slice(-2);
                else if (s.dashboardChartFiltro === 'Ultimo') dataToRender = dataToRender.slice(-1);

                const labels = dataToRender.map(p => p.periodo.split(' ')[0]); 
                const ingresosBrutos = dataToRender.map(p => p.ingresoProy); 
                const utilidadesBrutas = dataToRender.map(p => p.utilProy);
                const utilidadesNetas = dataToRender.map(p => p.utilReal); 
                const costos = dataToRender.map(p => p.gastos); 

                if(window.dashChart) window.dashChart.destroy();
                window.dashChart = new Chart(ctx, {
                    type: 'line',
                    data: { 
                        labels: labels, 
                        datasets: [
                            { label: 'Ingresos', data: ingresosBrutos, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4, borderWidth: 3, fill: true, pointRadius: 3 }, 
                            { label: 'Costos', data: costos, borderColor: '#ef4444', backgroundColor: 'transparent', tension: 0.4, borderWidth: 2, borderDash: [5, 5], pointRadius: 2 },
                            { label: 'Util. Bruta', data: utilidadesBrutas, borderColor: '#10b981', backgroundColor: 'transparent', tension: 0.4, borderWidth: 2, pointRadius: 2 },
                            { label: 'Util. Neta', data: utilidadesNetas, borderColor: '#0f766e', backgroundColor: 'rgba(15, 118, 110, 0.1)', tension: 0.4, borderWidth: 3, fill: true, pointRadius: 3 }
                        ]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                        plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 6, font: { weight: 'bold', size: window.innerWidth < 640 ? 10 : 12 } } }, tooltip: { callbacks: { label: function(context) { return context.dataset.label + ': ' + formatCOP(context.parsed.y); } } } }, 
                        scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { weight: 'bold', size: 10 }, color: '#94a3b8', callback: function(value) { return '$' + (value / 1000000) + 'M'; } } }, x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 10 }, color: '#64748b' } } } 
                    }
                });
            }
        }
    }
};

// Exponer de forma global al navegador para HTML inline
window.App = App;

// Inicialización del Sistema (Conexión Cloud Diferida)
window.onload = () => {
    App.applyTheme();
    App.render();
    
    // Si la configuración de Firebase fue llenada (No es modo Offline)
    if (window.isFirebaseReady) {
        signInAnonymously(auth).then(() => {
            const colecciones = ['cuentas', 'transacciones', 'viajes', 'clientesDir', 'socios', 'pagosNomina'];
            
            // Importar Firestore de manera asíncrona para que no bloquee el render local
            import("https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js").then(fsModule => {
                window.fsModule = fsModule; // Guardar módulo de firestore para uso global de guardado
                
                // Activar Escuchadores en vivo
                colecciones.forEach(col => {
                    fsModule.onSnapshot(collection(db, 'artifacts', 'don-sebe-erp', 'public', 'data', col), (snapshot) => {
                        const data = snapshot.docs.map(d => d.data());
                        if (data.length > 0) { 
                            App.state[col] = data; 
                            App.render(); 
                        } else if (App.state[col] !== SEED_DATA[col]) {
                             // Si está vacío en la nube, mostramos vacío (salvo el primer inicio)
                             App.state[col] = [];
                             App.render();
                        }
                    });
                });
            });
        }).catch(err => console.error("Error Auth Firebase:", err));
    }
};

</script>
</body>
</html>
