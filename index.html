        const socioData = { nombre: f.nombre.value, porcentaje: parseFloat(f.porcentaje.value), inversion: formD.inversion, saldoMantenimiento: f.tipoSaldo.value === 'deuda' ? -Math.abs(formD.saldoMantenimiento) : Math.abs(formD.saldoMantenimiento), utilidadCausada: App.state.editingSocioId ? App.state.socios.find(x => x.id === newId).utilidadCausada : 0 };

    submitTransferencia: async (e) => {
        e.preventDefault(); const f = e.target; const vId = parseInt(f.vendedor.value); const cId = parseInt(f.comprador.value); const pctStr = f.porcentaje.value.replace(',', '.'); const pct = parseFloat(pctStr);
        if(vId === cId) return; const s = App.state.socios; const vIdx = s.findIndex(x => x.id === vId); const cIdx = s.findIndex(x => x.id === cId);
        if(vIdx === -1 || cIdx === -1 || pct <= 0 || pct > s[vIdx].porcentaje) return;

        const fraction = pct / s[vIdx].porcentaje; const invTransfer = s[vIdx].inversion * fraction; const deudaTransfer = s[vIdx].saldoMantenimiento * fraction;
        
        await window.dbHelper.save('socios', vId, { ...s[vIdx], porcentaje: s[vIdx].porcentaje - pct, inversion: s[vIdx].inversion - invTransfer, saldoMantenimiento: s[vIdx].saldoMantenimiento - deudaTransfer });
        await window.dbHelper.save('socios', cId, { ...s[cIdx], porcentaje: s[cIdx].porcentaje + pct, inversion: s[cIdx].inversion + invTransfer, saldoMantenimiento: s[cIdx].saldoMantenimiento + deudaTransfer });
        App.closeModals();
    },

    // Calculadoras
    getTotales: () => {
        const s = App.state;
        const ingresoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.ingreso), 0);
        const gastoTotal = s.viajes.reduce((acc, curr) => acc + Number(curr.gastos), 0);
        const utilidadBruta = s.viajes.reduce((acc, curr) => acc + Number(curr.utilidadBruta), 0);
        const carteraTotal = s.carteraClientes.filter(c => c.estado === 'Pendiente').reduce((acc, curr) => acc + Number(curr.valorTotal), 0);
        const utilidadNeta = ingresoTotal - gastoTotal; 
        const ingresoRecaudado = ingresoTotal - carteraTotal;
        const inversionTotal = s.socios.reduce((acc, curr) => acc + curr.inversion, 0);
        return { ingresoTotal, gastoTotal, utilidadBruta, carteraTotal, utilidadNeta, ingresoRecaudado, inversionTotal };
    },

            const isDeuda = s.editingSocioId ? (App.state.socios.find(x => x.id === s.editingSocioId).saldoMantenimiento < 0) : true;
            
            h += `<div class="${modalContainerClass}"><div class="${modalBoxClass}"><div class="flex justify-between items-center mb-5"><h3 class="font-black text-xl text-slate-800">${titulo}</h3><button onclick="window.App.closeModals()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button></div><form onsubmit="window.App.submitSocio(event)" class="space-y-4">
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Nombre o Razón Social</label><input name="nombre" type="text" value="${fSocio.nombre}" required placeholder="Ej: Socio Principal" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none"/></div>
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Porcentaje de Participación (%)</label><input name="porcentaje" type="number" step="0.01" min="0" max="100" value="${fSocio.porcentaje}" required placeholder="Ej: 15.5" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none"/></div>
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Capital Invertido</label><div onclick="window.App.openNumpad('inversion', 'Inversión Base', 'socio')" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm bg-slate-50 text-slate-800 font-bold cursor-pointer hover:border-blue-400 truncate">${formatCOP(fSocio.inversion)}</div></div>
                ${!s.editingSocioId ? `<div class="space-y-1 bg-green-50 p-3 rounded-xl border border-green-200"><label class="text-[10px] font-bold text-green-700 uppercase">¿A qué cuenta ingresa esta inversión?</label><select name="cuentaId" required class="w-full border border-green-300 p-2 rounded text-sm outline-none bg-white"><option value="">Seleccione cuenta destino...</option>${s.cuentas.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('')}</select></div>` : ''}
                <div class="grid grid-cols-5 gap-3 items-end">
                    <div class="col-span-3 space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Saldo Mantenimiento Extra</label><div onclick="window.App.openNumpad('saldoMantenimiento', 'Saldo de Mantenimiento', 'socio')" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm bg-slate-50 text-slate-800 font-bold cursor-pointer hover:border-blue-400 truncate">${formatCOP(fSocio.saldoMantenimiento)}</div></div>
                    <div class="col-span-2 space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Tipo</label><select name="tipoSaldo" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none bg-white"><option value="deuda" ${isDeuda ? 'selected' : ''}>Es Deuda (-)</option><option value="favor" ${!isDeuda ? 'selected' : ''}>A Favor (+)</option></select></div>
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl hover:bg-slate-800 shadow-lg transition-all mt-2">Guardar Socio</button></form></div></div>`;
        }

        // Modal Transferir Acciones
        if (s.isTransferOpen) {
            h += `<div class="${modalContainerClass}"><div class="${modalBoxClass}"><div class="flex justify-between items-center mb-5"><h3 class="font-black text-xl text-slate-800"><i data-lucide="arrow-right-left" class="w-5 h-5 inline mr-2 text-indigo-600"></i> Transferir Acciones</h3><button onclick="window.App.closeModals()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button></div>
                <p class="text-xs text-slate-500 mb-4">Esta acción descontará el porcentaje y capital base proporcional del socio origen, sumándolo al socio receptor.</p>
                <form onsubmit="window.App.submitTransferencia(event)" class="space-y-4">
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Vendedor (Quien cede)</label><select name="vendedor" required class="w-full border-2 border-red-200 p-3 rounded-xl text-sm outline-none bg-red-50 text-red-900"><option value="">Seleccione origen...</option>${s.socios.map(socio => `<option value="${socio.id}">${socio.nombre} (Tiene: ${socio.porcentaje}%)</option>`).join('')}</select></div>
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Comprador (Quien recibe)</label><select name="comprador" required class="w-full border-2 border-green-200 p-3 rounded-xl text-sm outline-none bg-green-50 text-green-900"><option value="">Seleccione receptor...</option>${s.socios.map(socio => `<option value="${socio.id}">${socio.nombre} (Tiene: ${socio.porcentaje}%)</option>`).join('')}</select></div>
                <div class="space-y-1"><label class="text-xs font-bold text-slate-500 uppercase">Porcentaje a Transferir (%)</label><input name="porcentaje" type="number" step="0.01" min="0.01" max="100" required placeholder="Ej: 5.0" class="w-full border-2 border-slate-200 p-3 rounded-xl text-sm focus:border-blue-500 outline-none"/></div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-600/30 transition-all mt-4">Ejecutar Transferencia</button></form></div></div>`;
        }

        return h;
    },

    // Renderizador Principal (Refresca el HTML)
    render: () => {
        const root = document.getElementById('app-root');
        
        let mainContent = '';
        switch(App.state.activeTab) {
            case 'dashboard': mainContent = App.renderDashboard(); break;
            case 'tesoreria': mainContent = App.renderTesoreria(); break;
            case 'viajes': mainContent = App.renderViajes(); break;
            case 'cartera': mainContent = App.renderCartera(); break;
            case 'documentos': mainContent = App.renderDocumentos(); break;
            case 'nomina': mainContent = App.renderNomina(); break;
            case 'clientes': mainContent = App.renderClientes(); break;
            case 'finanzas': mainContent = App.renderNIIF(); break;
            case 'sociedad': mainContent = App.renderSociedad(); break;
            case 'basedatos': mainContent = App.renderBaseDatos(); break;
            case 'config': mainContent = App.renderConfig(); break;
        }

        root.innerHTML = `
            ${App.renderModals()}
            
            <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center z-10 shrink-0 print:hidden shadow-sm sticky top-0">
                <div class="flex items-center">
                    ${App.state.activeTab !== 'dashboard' ? `<button onclick="window.App.setTab('dashboard')" class="mr-3 sm:mr-4 bg-slate-100 p-2 rounded-full text-slate-600 hover:bg-slate-200 transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>` : ''}
                    <h1 onclick="window.App.setTab('dashboard')" class="text-lg sm:text-xl font-black text-slate-800 flex items-center tracking-tight cursor-pointer hover:text-blue-600 transition-colors"><i data-lucide="anchor" class="mr-2 text-blue-600 w-5 h-5 sm:w-6 sm:h-6"></i> Don Sebe</h1>
                </div>
                <div class="bg-slate-900 text-white px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold shadow-md flex items-center"><div class="w-2 h-2 ${window.isFirebaseReady ? 'bg-green-400 animate-pulse' : 'bg-red-400'} rounded-full mr-2"></div> ${window.isFirebaseReady ? 'Cloud Sync' : 'Modo Offline (Local)'}</div>
            </header>
            
            <main class="flex-1 overflow-y-auto p-4 md:p-6 pb-8 bg-slate-50 print:bg-white print:p-0 print:overflow-visible">
                <div class="max-w-6xl mx-auto">${mainContent}</div>
            </main>

            <!-- FAB Botón Flotante -->
            <div class="fixed bottom-6 right-6 z-50 print:hidden flex flex-col items-end space-y-3">
                ${App.state.isFabOpen ? `
                    <button onclick="window.App.state.isAddViajeOpen=true; window.App.state.editingViajeId=null; window.App.state.isFabOpen=false; window.App.render()" class="bg-blue-600 text-white p-3.5 rounded-full shadow-lg hover:bg-blue-700 flex items-center animate-fade-in transition-transform hover:scale-105"><span class="mr-3 font-bold text-xs bg-slate-800 px-2 py-1 rounded shadow">Nuevo Viaje</span><i data-lucide="ship" class="w-5 h-5"></i></button>
                    <button onclick="window.App.state.isAddClienteOpen=true; window.App.state.editingClienteId=null; window.App.state.isFabOpen=false; window.App.render()" class="bg-green-600 text-white p-3.5 rounded-full shadow-lg hover:bg-green-700 flex items-center animate-fade-in transition-transform hover:scale-105"><span class="mr-3 font-bold text-xs bg-slate-800 px-2 py-1 rounded shadow">Nuevo Cliente</span><i data-lucide="user-plus" class="w-5 h-5"></i></button>
                ` : ''}
                <button onclick="window.App.state.isFabOpen = !window.App.state.isFabOpen; window.App.render()" class="bg-slate-900 text-white p-4 rounded-full shadow-2xl hover:bg-slate-800 active:scale-95 transition-transform">
                    <i data-lucide="${App.state.isFabOpen ? 'x' : 'plus'}" class="w-6 h-6 transition-transform ${App.state.isFabOpen ? 'rotate-90' : ''}"></i>
                </button>
            </div>
        `;

        if (window.lucide) lucide.createIcons();

        // Renderizado gráfico Avanzado
        if(App.state.activeTab === 'dashboard') {
            const ctx = document.getElementById('lineChart');
            if(ctx) {
                const s = App.state;
                let dataToRender = s.informePeriodos;
                if (s.dashboardChartFiltro === 'Ultimos2') dataToRender = dataToRender.slice(-2);
                else if (s.dashboardChartFiltro === 'Ultimo') dataToRender = dataToRender.slice(-1);

                const labels = dataToRender.map(p => p.periodo.split(' ')[0]); 
                const ingresosBrutos = dataToRender.map(p => p.ingresoProy); 
                const utilidadesBrutas = dataToRender.map(p => p.utilProy);
                const utilidadesNetas = dataToRender.map(p => p.utilReal); 
                const costos = dataToRender.map(p => p.ingresoProy - p.utilProy); 

                if(window.dashChart) window.dashChart.destroy();
                window.dashChart = new Chart(ctx, {
                    type: 'line',
                    data: { 
                        labels: labels, 
                        datasets: [
                            { label: 'Ingresos', data: ingresosBrutos, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4, borderWidth: 3, fill: true, pointRadius: 3 }, 
                            { label: 'Costos', data: costos, borderColor: '#ef4444', backgroundColor: 'transparent', tension: 0.4, borderWidth: 2, borderDash: [5, 5], pointRadius: 2 },
                            { label: 'Util. Bruta', data: utilidadesBrutas, borderColor: '#10b981', backgroundColor: 'transparent', tension: 0.4, borderWidth: 2, pointRadius: 2 },
                            { label: 'Util. Neta', data: utilidadesNetas, borderColor: '#0f766e', backgroundColor: 'rgba(15, 118, 110, 0.1)', tension: 0.4, borderWidth: 3, fill: true, pointRadius: 3 }
                        ]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
                        plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 6, font: { weight: 'bold', size: window.innerWidth < 640 ? 10 : 12 } } }, tooltip: { callbacks: { label: function(context) { return context.dataset.label + ': ' + formatCOP(context.parsed.y); } } } }, 
                        scales: { y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { font: { weight: 'bold', size: 10 }, color: '#94a3b8', callback: function(value) { return '$' + (value / 1000000) + 'M'; } } }, x: { grid: { display: false }, ticks: { font: { weight: 'bold', size: 10 }, color: '#64748b' } } } 
                    }
                });
            }
        }
    }
};

// Exponer de forma global al navegador para HTML inline
window.App = App;

// Inicialización del Sistema (Conexión Cloud Diferida)
window.onload = () => {
    App.applyTheme();
    App.render();
    
    // Si la configuración de Firebase fue llenada (No es modo Offline)
    if (window.isFirebaseReady) {
        signInAnonymously(auth).then(() => {
            const colecciones = ['cuentas', 'transacciones', 'viajes', 'clientesDir', 'socios', 'pagosNomina'];
            
            // Importar Firestore de manera asíncrona para que no bloquee el render local
            import("https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js").then(fsModule => {
                window.fsModule = fsModule; // Guardar módulo de firestore para uso global de guardado
                
                // Activar Escuchadores en vivo
                colecciones.forEach(col => {
                    fsModule.onSnapshot(collection(db, 'artifacts', 'don-sebe-erp', 'public', 'data', col), (snapshot) => {
                        const data = snapshot.docs.map(d => d.data());
                        if (data.length > 0) { 
                            App.state[col] = data; 
                            App.render(); 
                        } else if (App.state[col] !== SEED_DATA[col]) {
                             // Si está vacío en la nube, mostramos vacío (salvo el primer inicio)
                             App.state[col] = [];
                             App.render();
                        }
                    });
                });
            });
        }).catch(err => console.error("Error Auth Firebase:", err));
    }
};

</script>
</body>
</html>
